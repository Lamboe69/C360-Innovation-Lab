<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Club — C360 Innovation Lab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800;900&family=DM+Sans:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="global.css">
  <style>
    :root { --sidebar-w: 250px; }
    body { display: flex; flex-direction: column; min-height: 100vh; background: var(--navy); cursor: none; }

    /* ── TOP NAV ── */
    .topnav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 500;
      height: 72px; background: rgba(7,9,15,0.95);
      backdrop-filter: blur(24px) saturate(180%);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px;
      animation: navSlide 0.8s cubic-bezier(0.16,1,0.3,1) both;
    }
    @keyframes navSlide { from{transform:translateY(-100%);opacity:0} to{transform:translateY(0);opacity:1} }
    .topnav-left { display: flex; align-items: center; gap: 14px; }
    .sidebar-toggle {
      background: none; border: none; cursor: none;
      display: flex; flex-direction: column; gap: 5px; padding: 6px;
      border-radius: 8px; transition: background 0.2s;
    }
    .sidebar-toggle:hover { background: var(--glass-b); }
    .sidebar-toggle span { display: block; width: 22px; height: 2px; background: var(--silver); border-radius: 2px; }
    .topnav .nav-logo {
      font-family: var(--font-d); font-size: 1.15rem; font-weight: 900;
      color: var(--cream); white-space: nowrap;
      display: flex; align-items: center; gap: 10px;
    }
    .topnav-right { display: flex; align-items: center; gap: 12px; }
    .topnav-bell {
      position: relative; display: flex; align-items: center;
      cursor: none; padding: 8px; border-radius: 10px; transition: background 0.2s;
    }
    .topnav-bell:hover { background: var(--glass-b); }
    .topnav-bell-badge {
      position: absolute; top: 4px; right: 4px;
      min-width: 16px; height: 16px; padding: 0 4px;
      background: var(--flame); color: #fff;
      font-family: var(--font-m); font-size: 0.55rem; font-weight: 700;
      border-radius: 100px; display: flex; align-items: center; justify-content: center;
      border: 2px solid var(--ink);
    }
    .topnav-avatar-wrap {
      display: flex; align-items: center; gap: 8px;
      cursor: none; padding: 5px 12px 5px 5px;
      border-radius: 100px; border: 1px solid var(--border);
      background: var(--glass); transition: border-color 0.2s, background 0.2s;
    }
    .topnav-avatar-wrap:hover { border-color: rgba(245,166,35,0.4); background: var(--glass-b); }
    .topnav-avatar {
      width: 32px; height: 32px; border-radius: 50%;
      background: linear-gradient(135deg, var(--gold), var(--flame));
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-m); font-size: 0.75rem; font-weight: 700; color: #fff;
    }
    .topnav-name { font-size: 0.85rem; font-weight: 600; color: var(--cream); }

    /* ── LAYOUT ── */
    .layout { display: flex; margin-top: 72px; flex: 1; }

    /* ── SIDEBAR ── */
    .sidebar {
      width: var(--sidebar-w); flex-shrink: 0;
      background: var(--deep); border-right: 1px solid var(--border);
      min-height: calc(100vh - 72px);
      position: fixed; top: 72px; left: 0; bottom: 0;
      display: flex; flex-direction: column;
      transition: transform 0.3s ease; z-index: 150; overflow-y: auto;
    }
    .sidebar.collapsed { transform: translateX(calc(-1 * var(--sidebar-w))); }
    .sidebar-user {
      padding: 22px 20px 18px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 12px;
    }
    .sidebar-avatar {
      width: 42px; height: 42px; border-radius: 50%; flex-shrink: 0;
      background: linear-gradient(135deg, var(--gold), var(--flame));
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-m); font-size: 1rem; font-weight: 700; color: #fff;
      border: 2px solid rgba(245,166,35,0.3);
    }
    .sidebar-uname { font-size: 0.88rem; font-weight: 700; color: var(--cream); font-family: var(--font-d); }
    .sidebar-urole { font-size: 0.68rem; color: var(--muted); margin-top: 2px; font-family: var(--font-m); text-transform: capitalize; }
    .sidebar-nav { padding: 12px 0; flex: 1; }
    .nav-section-label {
      font-family: var(--font-m); font-size: 0.62rem; font-weight: 700;
      letter-spacing: 1.5px; text-transform: uppercase;
      color: rgba(245,166,35,0.35); padding: 14px 20px 5px;
    }
    .sidebar-link {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 20px; color: rgba(226,232,240,0.6);
      font-size: 0.86rem; font-weight: 500;
      transition: background 0.2s, color 0.2s;
      cursor: none; border: none; background: none;
      width: 100%; text-align: left; font-family: var(--font-b);
      border-right: 3px solid transparent;
    }
    .sidebar-link:hover { background: var(--glass-b); color: var(--cream); }
    .sidebar-link.active { background: rgba(245,166,35,0.1); color: var(--gold); font-weight: 700; border-right-color: var(--gold); }
    .sidebar-link .s-icon { font-size: 1rem; width: 20px; text-align: center; flex-shrink: 0; }
    .sidebar-link.logout-link { color: rgba(252,165,165,0.7); }
    .sidebar-link.logout-link:hover { background: rgba(239,68,68,0.08); color: #f87171; }
    .sidebar-footer { padding: 14px 20px; border-top: 1px solid var(--border); font-family: var(--font-m); font-size: 0.65rem; color: rgba(245,166,35,0.25); letter-spacing: 1px; }

    /* ── MAIN ── */
    .main { margin-left: var(--sidebar-w); flex: 1; padding: 32px 28px; transition: margin-left 0.3s ease; min-width: 0; }
    .main.expanded { margin-left: 0; }
    .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 140; }
    .overlay.show { display: block; }

    /* ── SHARED ── */
    .section-card { background: var(--glass); border: 1px solid var(--border); border-radius: 14px; padding: 24px; margin-bottom: 20px; }
    .section-card:last-child { margin-bottom: 0; }
    .section-card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
    .section-card-header h2 { font-family: var(--font-d); font-size: 1rem; font-weight: 800; color: var(--cream); }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
    .btn-action {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 9px 18px; border-radius: 8px;
      font-family: var(--font-b); font-size: 0.82rem; font-weight: 700;
      background: linear-gradient(135deg, var(--gold), var(--flame));
      color: #fff; border: none; cursor: none;
      box-shadow: 0 4px 16px rgba(245,166,35,0.25);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .btn-action:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(245,166,35,0.4); }
    .btn-action-outline {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 9px 18px; border-radius: 8px;
      font-family: var(--font-b); font-size: 0.82rem; font-weight: 600;
      background: var(--glass); color: var(--silver);
      border: 1px solid var(--border); cursor: none;
      transition: border-color 0.2s, color 0.2s;
    }
    .btn-action-outline:hover { border-color: rgba(245,166,35,0.4); color: var(--gold); }
    .status-badge {
      display: inline-block; padding: 3px 10px; border-radius: 100px;
      font-family: var(--font-m); font-size: 0.6rem; font-weight: 700; letter-spacing: 0.5px;
    }
    .status-badge.active   { background: rgba(16,185,129,0.12); color: #6ee7b7; }
    .status-badge.inactive { background: rgba(100,116,139,0.12); color: var(--muted); }
    .status-badge.pending  { background: rgba(245,166,35,0.12);  color: var(--gold); }
    .members-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    .members-table th { text-align: left; padding: 10px 14px; font-family: var(--font-m); font-size: 0.62rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); border-bottom: 1px solid var(--border); }
    .members-table td { padding: 12px 14px; color: var(--silver); border-bottom: 1px solid rgba(255,255,255,0.04); }
    .members-table tr:last-child td { border-bottom: none; }
    .members-table tr:hover td { background: rgba(255,255,255,0.02); }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      .sidebar { transform: translateX(calc(-1 * var(--sidebar-w))); }
      .sidebar.open { transform: translateX(0); }
      .main { margin-left: 0; padding: 20px 16px; }
      .grid-2 { grid-template-columns: 1fr; }
    }
    @media (max-width: 480px) { .topnav { padding: 0 14px; } .topnav-name { display: none; } }

    /* ── ADMIN BANNER ── */
    .admin-view-note {
      background: rgba(99,179,237,0.08); border: 1px solid rgba(99,179,237,0.2);
      color: #63b3ed; border-radius: 10px; padding: 12px 18px;
      font-size: 0.82rem; font-weight: 500; margin-bottom: 20px;
      font-family: var(--font-m); letter-spacing: 0.3px;
    }

    /* ── CLUB HEADER ── */
    .club-header-card {
      background: linear-gradient(135deg, rgba(245,166,35,0.06) 0%, rgba(255,90,31,0.03) 100%);
      border: 1px solid rgba(245,166,35,0.2); border-radius: 20px;
      padding: 32px 36px; margin-bottom: 24px;
      display: flex; align-items: center; justify-content: space-between;
      gap: 24px; flex-wrap: wrap; position: relative; overflow: hidden;
    }
    .club-header-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, var(--gold), var(--flame), transparent);
    }
    .club-header-left { display: flex; align-items: center; gap: 20px; }
    .club-avatar {
      width: 64px; height: 64px; border-radius: 16px; flex-shrink: 0;
      background: rgba(245,166,35,0.1); border: 1px solid rgba(245,166,35,0.2);
      display: flex; align-items: center; justify-content: center; font-size: 1.8rem;
    }
    .club-name {
      font-family: var(--font-d); font-size: 1.4rem; font-weight: 900;
      color: var(--cream); letter-spacing: -0.3px; margin-bottom: 10px;
    }
    .club-meta {
      display: flex; gap: 18px; flex-wrap: wrap;
      font-family: var(--font-m); font-size: 0.65rem;
      letter-spacing: 0.8px; color: var(--muted);
    }
    .club-header-right { display: flex; flex-direction: column; align-items: flex-end; gap: 10px; }
    .club-role-badge {
      display: inline-block; padding: 5px 14px; border-radius: 100px;
      background: rgba(245,166,35,0.1); border: 1px solid rgba(245,166,35,0.2);
      color: var(--gold); font-family: var(--font-m); font-size: 0.65rem; font-weight: 700;
      letter-spacing: 1px;
    }
    @media (max-width: 640px) {
      .club-header-card { flex-direction: column; align-items: flex-start; padding: 24px 20px; }
      .club-header-right { align-items: flex-start; }
    }

    /* ── MEETINGS ── */
    .meetings-list { display: flex; flex-direction: column; gap: 14px; }
    .meeting-item { display: flex; align-items: flex-start; gap: 16px; }
    .meeting-date {
      width: 46px; flex-shrink: 0; text-align: center;
      background: linear-gradient(135deg, var(--gold), var(--flame));
      color: #fff; border-radius: 10px; padding: 7px 4px;
    }
    .m-day { font-family: var(--font-d); font-size: 1.2rem; font-weight: 900; line-height: 1; }
    .m-mon { font-family: var(--font-m); font-size: 0.58rem; font-weight: 700; text-transform: uppercase; margin-top: 2px; }
    .meeting-title { font-size: 0.88rem; font-weight: 700; color: var(--cream); margin-bottom: 5px; }
    .meeting-meta { font-size: 0.75rem; color: var(--muted); font-family: var(--font-m); display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

    /* ── ANNOUNCEMENTS ── */
    .announcements-list { display: flex; flex-direction: column; gap: 0; }
    .announcement-item { display: flex; gap: 14px; padding: 14px 0; border-bottom: 1px solid var(--border); }
    .announcement-item:last-child { border-bottom: none; }
    .ann-icon {
      width: 36px; height: 36px; border-radius: 10px; flex-shrink: 0;
      background: rgba(245,166,35,0.08); border: 1px solid rgba(245,166,35,0.15);
      display: flex; align-items: center; justify-content: center; font-size: 1rem;
    }
    .ann-title { font-size: 0.85rem; font-weight: 700; color: var(--cream); margin-bottom: 4px; }
    .ann-text { font-size: 0.78rem; color: var(--silver); line-height: 1.6; font-weight: 300; margin-bottom: 4px; }
    .ann-time { font-size: 0.68rem; color: var(--muted); font-family: var(--font-m); }

    /* ── LEAVE CLUB ── */
    .leave-club-wrap { display: flex; justify-content: flex-end; margin-top: 32px; padding-top: 20px; border-top: 1px solid var(--border); }
    .btn-leave-club {
      padding: 8px 20px; border-radius: 8px; cursor: none;
      font-family: var(--font-b); font-size: 0.78rem; font-weight: 600;
      background: transparent; color: rgba(252,165,165,0.5);
      border: 1px solid rgba(239,68,68,0.15);
      transition: border-color 0.2s, color 0.2s, background 0.2s;
    }
    .btn-leave-club:hover { border-color: rgba(239,68,68,0.4); color: #f87171; background: rgba(239,68,68,0.06); }

    /* ── TABLE ACTION BUTTONS ── */
    .btn-table-action {
      padding: 4px 12px; border-radius: 6px; cursor: none;
      font-family: var(--font-b); font-size: 0.72rem; font-weight: 600;
      background: transparent; color: rgba(252,165,165,0.6);
      border: 1px solid rgba(239,68,68,0.2);
      transition: border-color 0.2s, color 0.2s, background 0.2s;
    }
    .btn-table-action:hover { border-color: rgba(239,68,68,0.5); color: #f87171; background: rgba(239,68,68,0.06); }
    .btn-table-action.approve { color: #6ee7b7; border-color: rgba(16,185,129,0.2); }
    .btn-table-action.approve:hover { border-color: rgba(16,185,129,0.5); background: rgba(16,185,129,0.06); }

    /* ── ADMIN STATS ── */
    .admin-stats-row { display: grid; grid-template-columns: repeat(4,1fr); gap: 16px; }
    .admin-stat {
      background: rgba(245,166,35,0.05); border: 1px solid rgba(245,166,35,0.12);
      border-radius: 12px; padding: 18px; text-align: center;
    }
    .admin-stat-val {
      font-family: var(--font-d); font-size: 1.6rem; font-weight: 900; line-height: 1;
      background: linear-gradient(135deg, var(--gold), var(--flame));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .admin-stat-lbl { font-size: 0.72rem; color: var(--muted); margin-top: 6px; font-family: var(--font-m); letter-spacing: 0.5px; }
    @media (max-width: 640px) { .admin-stats-row { grid-template-columns: repeat(2,1fr); } }
  </style>
</head>
<body>

<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursor-ring"></div>

<!-- TOP NAV -->
<nav class="topnav">
  <div class="topnav-left">
    <button class="sidebar-toggle" onclick="toggleSidebar()" aria-label="Toggle sidebar">
      <span></span><span></span><span></span>
    </button>
    <a href="index.html" class="nav-logo">
      <div class="logo-mark">C360</div>
      Innovation Lab
    </a>
  </div>
  <div class="topnav-right">
    <div class="topnav-bell" id="topnav-bell">
      <span style="font-size:1.1rem;">🔔</span>
      <span class="topnav-bell-badge" id="topnav-bell-badge">3</span>
    </div>
    <div class="topnav-avatar-wrap">
      <div class="topnav-avatar" id="topnav-initial">U</div>
      <span class="topnav-name" id="topnav-name">User</span>
    </div>
  </div>
</nav>

<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<div class="layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-user">
      <div class="sidebar-avatar" id="sidebar-initial">U</div>
      <div>
        <div class="sidebar-uname" id="sidebar-name">User</div>
        <div class="sidebar-urole" id="sidebar-role">Member</div>
      </div>
    </div>
    <nav class="sidebar-nav" id="sidebar-nav"></nav>
    <div class="sidebar-logout-wrap" id="sidebar-logout-wrap"></div>
    <div class="sidebar-footer">© 2025 C360 Innovation Lab</div>
  </aside>

  <main class="main" id="main">
    <div id="club-content"></div>
  </main>
</div>

<!-- SECTIONS COMING NEXT -->

<script>
  /* ── AUTH GUARD ── */
  if (!localStorage.getItem('c360_logged_in')) { window.location.href = 'login.html'; }

  const userName    = localStorage.getItem('c360_username') || 'User';
  const userRole    = localStorage.getItem('c360_role') || 'student';
  const userInitial = userName.charAt(0).toUpperCase();

  /* ── POPULATE SHELL ── */
  document.getElementById('topnav-initial').textContent  = userInitial;
  document.getElementById('topnav-name').textContent     = userName.split(' ')[0];
  document.getElementById('sidebar-initial').textContent = userInitial;
  document.getElementById('sidebar-name').textContent    = userName;
  document.getElementById('sidebar-role').textContent    = userRole.replace('-', ' ');

  /* ── CURSOR ── */
  const cursor = document.getElementById('cursor');
  const ring   = document.getElementById('cursor-ring');
  let mx = -100, my = -100, rx = -100, ry = -100;
  document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
  (function animCursor() {
    if (cursor) { cursor.style.left = mx+'px'; cursor.style.top = my+'px'; }
    rx += (mx - rx) * 0.12; ry += (my - ry) * 0.12;
    if (ring) { ring.style.left = rx+'px'; ring.style.top = ry+'px'; }
    requestAnimationFrame(animCursor);
  })();
  document.querySelectorAll('a,button').forEach(el => {
    el.addEventListener('mouseenter', () => {
      if (cursor) cursor.style.transform = 'translate(-50%,-50%) scale(2.5)';
      if (ring) { ring.style.transform = 'translate(-50%,-50%) scale(1.5)'; ring.style.borderColor = 'rgba(245,166,35,0.9)'; }
    });
    el.addEventListener('mouseleave', () => {
      if (cursor) cursor.style.transform = 'translate(-50%,-50%) scale(1)';
      if (ring) { ring.style.transform = 'translate(-50%,-50%) scale(1)'; ring.style.borderColor = 'rgba(245,166,35,0.5)'; }
    });
  });

  /* ── SIDEBAR TOGGLE ── */
  const sidebar   = document.getElementById('sidebar');
  const mainEl    = document.getElementById('main');
  const overlay   = document.getElementById('overlay');
  const isDesktop = () => window.innerWidth > 768;
  function toggleSidebar() {
    if (isDesktop()) { sidebar.classList.toggle('collapsed'); mainEl.classList.toggle('expanded'); }
    else { sidebar.classList.toggle('open'); overlay.classList.toggle('show'); }
  }
  function closeSidebar() { sidebar.classList.remove('open'); overlay.classList.remove('show'); }
  window.addEventListener('resize', () => { if (isDesktop()) { sidebar.classList.remove('open'); overlay.classList.remove('show'); } });
  function setActive(el) {
    document.querySelectorAll('.sidebar-link').forEach(l => l.classList.remove('active'));
    el.classList.add('active');
    if (!isDesktop()) closeSidebar();
  }
  function handleLogout() {
    ['c360_logged_in','c360_username','c360_role','c360_email'].forEach(k => localStorage.removeItem(k));
    window.location.href = 'index.html';
  }
  document.getElementById('topnav-bell').addEventListener('click', () => {
    document.getElementById('topnav-bell-badge').style.display = 'none';
  });

  /* ── SIDEBAR LINKS ── */
  const commonTop = `
    <div class="nav-section-label">Main</div>
    <button class="sidebar-link" onclick="setActive(this);window.location.href='dashboard.html'"><span class="s-icon">🏠</span> Dashboard</button>
    <button class="sidebar-link" onclick="setActive(this);window.location.href='profile.html'"><span class="s-icon">👤</span> My Profile</button>
    <button class="sidebar-link active" onclick="setActive(this)"><span class="s-icon">🌱</span> My Club</button>
    <div class="nav-section-label">Programs</div>
    <button class="sidebar-link" onclick="setActive(this);window.location.href='competitions.html'"><span class="s-icon">🏆</span> Competitions</button>
    <button class="sidebar-link" onclick="setActive(this);window.location.href='incubation.html'"><span class="s-icon">🚀</span> Apply for Incubation</button>
    <button class="sidebar-link" onclick="setActive(this);window.location.href='mentorship-sessions.html'"><span class="s-icon">🤝</span> Mentorship Sessions</button>
    <div class="nav-section-label">Resources</div>
    <button class="sidebar-link" onclick="setActive(this);window.location.href='resources.html'"><span class="s-icon">📚</span> Resources</button>
    <button class="sidebar-link" onclick="setActive(this);window.location.href='notifications.html'"><span class="s-icon">🔔</span> Notifications</button>
  `;
  const logoutLink = `
    <div class="nav-section-label">Account</div>
    <button class="sidebar-link logout-link" onclick="handleLogout()"><span class="s-icon">🚪</span> Logout</button>
  `;
  const clubLeaderExtra = `
    <div class="nav-section-label">Club Management</div>
    <button class="sidebar-link active" onclick="setActive(this)"><span class="s-icon">🛠️</span> Manage My Club</button>
  `;
  const adminExtra = `
    <div class="nav-section-label">Administration</div>
    <button class="sidebar-link" onclick="setActive(this)"><span class="s-icon">🌍</span> All Clubs</button>
    <button class="sidebar-link" onclick="setActive(this)"><span class="s-icon">👥</span> User Management</button>
    <button class="sidebar-link" onclick="setActive(this)"><span class="s-icon">📊</span> Analytics</button>
    <button class="sidebar-link" onclick="setActive(this)"><span class="s-icon">📝</span> Content Management</button>
  `;
  const mentorExtra = `
