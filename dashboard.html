<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard — C360 Innovation Lab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800;900&family=DM+Sans:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="global.css">
  <script src="theme.js"></script>
  <style>
    :root { --sidebar-w: 250px; }
    body { display: flex; flex-direction: column; min-height: 100vh; background: var(--navy); cursor: none; }

    /* ── TOP NAV ── */
    .topnav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 500;
      height: 72px; background: rgba(7,9,15,0.95);
      backdrop-filter: blur(24px) saturate(180%);
      -webkit-backdrop-filter: blur(24px) saturate(180%);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px;
      animation: navSlide 0.8s cubic-bezier(0.16,1,0.3,1) both;
    }
    @keyframes navSlide { from{transform:translateY(-100%);opacity:0} to{transform:translateY(0);opacity:1} }
    .topnav-left { display: flex; align-items: center; gap: 14px; }
    .sidebar-toggle {
      background: none; border: none; cursor: none;
      display: flex; flex-direction: column; gap: 5px; padding: 6px;
      border-radius: 8px; transition: background 0.2s;
    }
    .sidebar-toggle:hover { background: var(--glass-b); }
    .sidebar-toggle span { display: block; width: 22px; height: 2px; background: var(--silver); border-radius: 2px; transition: all 0.3s; }
    .topnav .nav-logo {
      font-family: var(--font-d); font-size: 1.15rem; font-weight: 900;
      color: var(--cream); white-space: nowrap;
      display: flex; align-items: center; gap: 10px;
    }
    .topnav-right { display: flex; align-items: center; gap: 12px; }

    /* ── TOP NAV BELL ── */
    .topnav-bell {
      position: relative; display: flex; align-items: center;
      cursor: none; padding: 8px; border-radius: 10px;
      transition: background 0.2s;
    }
    .topnav-bell:hover { background: var(--glass-b); }
    .topnav-bell-icon { font-size: 1.1rem; }
    .topnav-bell-badge {
      position: absolute; top: 4px; right: 4px;
      min-width: 16px; height: 16px; padding: 0 4px;
      background: var(--flame); color: #fff;
      font-family: var(--font-m); font-size: 0.55rem; font-weight: 700;
      border-radius: 100px; display: flex; align-items: center; justify-content: center;
      border: 2px solid var(--ink);
    }

    /* ── TOP NAV AVATAR ── */
    .topnav-avatar-wrap {
      display: flex; align-items: center; gap: 8px;
      cursor: none; padding: 5px 12px 5px 5px;
      border-radius: 100px; border: 1px solid var(--border);
      background: var(--glass); transition: border-color 0.2s, background 0.2s;
    }
    .topnav-avatar-wrap:hover { border-color: rgba(245,166,35,0.4); background: var(--glass-b); }
    .topnav-avatar {
      width: 32px; height: 32px; border-radius: 50%;
      background: linear-gradient(135deg, var(--gold), var(--flame));
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-m); font-size: 0.75rem; font-weight: 700; color: #fff;
    }
    .topnav-name { font-size: 0.85rem; font-weight: 600; color: var(--cream); }

    /* ── LAYOUT ── */
    .layout { display: flex; margin-top: 72px; flex: 1; }

    /* ── SIDEBAR ── */
    .sidebar {
      width: var(--sidebar-w); flex-shrink: 0;
      background: var(--deep); border-right: 1px solid var(--border);
      min-height: calc(100vh - 72px);
      position: fixed; top: 72px; left: 0; bottom: 0;
      display: flex; flex-direction: column;
      transition: transform 0.3s ease; z-index: 150; overflow-y: auto;
    }
    .sidebar.collapsed { transform: translateX(calc(-1 * var(--sidebar-w))); }
    .sidebar-user {
      padding: 22px 20px 18px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 12px;
    }
    .sidebar-avatar {
      width: 42px; height: 42px; border-radius: 50%; flex-shrink: 0;
      background: linear-gradient(135deg, var(--gold), var(--flame));
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-m); font-size: 1rem; font-weight: 700; color: #fff;
      border: 2px solid rgba(245,166,35,0.3);
    }
    .sidebar-uname { font-size: 0.88rem; font-weight: 700; color: var(--cream); font-family: var(--font-d); }
    .sidebar-urole {
      font-size: 0.68rem; color: var(--muted); margin-top: 2px;
      font-family: var(--font-m); text-transform: capitalize; letter-spacing: 0.5px;
    }
    .sidebar-nav { padding: 12px 0; flex: 1; }
    .nav-section-label {
      font-family: var(--font-m); font-size: 0.62rem; font-weight: 700;
      letter-spacing: 1.5px; text-transform: uppercase;
      color: rgba(245,166,35,0.35); padding: 14px 20px 5px;
    }
    .sidebar-link {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 20px; color: rgba(226,232,240,0.6);
      font-size: 0.86rem; font-weight: 500;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
      cursor: none; border: none; background: none;
      width: 100%; text-align: left; font-family: var(--font-b);
      border-right: 3px solid transparent;
    }
    .sidebar-link:hover { background: var(--glass-b); color: var(--cream); }
    .sidebar-link.active {
      background: rgba(245,166,35,0.1); color: var(--gold);
      font-weight: 700; border-right-color: var(--gold);
    }
    .sidebar-link .s-icon { font-size: 1rem; width: 20px; text-align: center; flex-shrink: 0; }
    .sidebar-link.logout-link { color: rgba(252,165,165,0.7); }
    .sidebar-link.logout-link:hover { background: rgba(239,68,68,0.08); color: #f87171; }
    .sidebar-footer {
      padding: 14px 20px; border-top: 1px solid var(--border);
      font-family: var(--font-m); font-size: 0.65rem;
      color: rgba(245,166,35,0.25); letter-spacing: 1px;
    }

    /* ── MAIN AREA ── */
    .main {
      margin-left: var(--sidebar-w); flex: 1;
      padding: 32px 28px; transition: margin-left 0.3s ease; min-width: 0;
    }
    .main.expanded { margin-left: 0; }
    .overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.6); z-index: 140;
    }
    .overlay.show { display: block; }

    /* ── SHARED CONTENT STYLES ── */
    .page-header { margin-bottom: 28px; }
    .page-header h1 {
      font-family: var(--font-d); font-size: 1.8rem; font-weight: 900;
      color: var(--cream); letter-spacing: -0.5px;
    }
    .page-header p { font-size: 0.85rem; color: var(--muted); margin-top: 4px; font-family: var(--font-m); }

    .stats-row { display: grid; grid-template-columns: repeat(4,1fr); gap: 18px; margin-bottom: 24px; }
    .stat-card {
      background: var(--glass); border: 1px solid var(--border);
      border-radius: 14px; padding: 20px 18px;
      display: flex; align-items: center; gap: 14px;
      transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
    }
    .stat-card:hover { transform: translateY(-3px); border-color: var(--border-h); box-shadow: 0 8px 28px rgba(0,0,0,0.3); }
    .stat-icon {
      width: 46px; height: 46px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center; font-size: 1.3rem; flex-shrink: 0;
    }
    .si-1{background:rgba(245,166,35,0.1);} .si-2{background:rgba(255,90,31,0.1);}
    .si-3{background:rgba(16,185,129,0.1);} .si-4{background:rgba(139,92,246,0.1);}
    .stat-val {
      font-family: var(--font-d); font-size: 1.5rem; font-weight: 900; line-height: 1;
      background: linear-gradient(135deg, var(--gold), var(--flame));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .stat-lbl { font-size: 0.73rem; color: var(--muted); margin-top: 4px; font-weight: 500; }
    .stat-change { font-size: 0.7rem; color: #6ee7b7; font-weight: 600; margin-top: 3px; }

    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }

    .section-card {
      background: var(--glass); border: 1px solid var(--border);
      border-radius: 14px; padding: 22px; margin-bottom: 20px;
    }
    .section-card:last-child { margin-bottom: 0; }
    .section-card-header {
      display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px;
    }
    .section-card-header h2 { font-family: var(--font-d); font-size: 1rem; font-weight: 800; color: var(--cream); }
    .view-all { font-size: 0.75rem; color: var(--gold); font-weight: 600; cursor: none; font-family: var(--font-m); }
    .view-all:hover { text-decoration: underline; }

    .activity-list { display: flex; flex-direction: column; }
    .activity-item { display: flex; align-items: center; gap: 12px; padding: 11px 0; border-bottom: 1px solid var(--border); }
    .activity-item:last-child { border-bottom: none; }
    .activity-dot { width: 34px; height: 34px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 0.95rem; flex-shrink: 0; }
    .ad-1{background:rgba(245,166,35,0.1);} .ad-2{background:rgba(255,90,31,0.1);}
    .ad-3{background:rgba(16,185,129,0.1);} .ad-4{background:rgba(139,92,246,0.1);}
    .a-title { font-size: 0.85rem; font-weight: 600; color: var(--text); }
    .a-time { font-size: 0.72rem; color: var(--muted); margin-top: 2px; }

    .events-list { display: flex; flex-direction: column; gap: 10px; }
    .event-card {
      display: flex; align-items: center; gap: 14px;
      padding: 12px 14px; border-radius: 10px;
      background: rgba(255,255,255,0.03); border: 1px solid var(--border);
      transition: border-color 0.2s, background 0.2s;
    }
    .event-card:hover { background: var(--glass-b); border-color: var(--border-h); }
    .event-date-box {
      width: 46px; flex-shrink: 0; text-align: center;
      background: linear-gradient(135deg, var(--gold), var(--flame));
      color: #fff; border-radius: 10px; padding: 7px 4px;
    }
    .e-day { font-family: var(--font-d); font-size: 1.2rem; font-weight: 900; line-height: 1; }
    .e-mon { font-family: var(--font-m); font-size: 0.58rem; font-weight: 700; text-transform: uppercase; margin-top: 2px; }
    .event-info { flex: 1; min-width: 0; }
    .e-name { font-size: 0.85rem; font-weight: 700; color: var(--cream); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .e-type { display: inline-block; margin-top: 4px; font-family: var(--font-m); font-size: 0.62rem; font-weight: 700; padding: 2px 8px; border-radius: 20px; }
    .et-workshop{background:rgba(245,166,35,0.12);color:var(--gold);}
    .et-competition{background:rgba(16,185,129,0.12);color:#6ee7b7;}
    .et-webinar{background:rgba(139,92,246,0.12);color:#c4b5fd;}
    .btn-view-event {
      padding: 6px 12px; background: var(--glass); color: var(--silver);
      border: 1px solid var(--border); border-radius: 7px;
      font-size: 0.75rem; font-weight: 700; cursor: none; white-space: nowrap; flex-shrink: 0;
      transition: border-color 0.2s, color 0.2s; font-family: var(--font-b);
    }
    .btn-view-event:hover { border-color: var(--border-h); color: var(--gold); }

    .progress-item { margin-bottom: 14px; }
    .progress-item:last-child { margin-bottom: 0; }
    .progress-header { display: flex; justify-content: space-between; margin-bottom: 6px; }
    .progress-header span { font-size: 0.82rem; font-weight: 600; color: var(--silver); }
    .progress-header .pct { color: var(--gold); font-family: var(--font-m); }
    .progress-bar { height: 6px; background: rgba(255,255,255,0.06); border-radius: 4px; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 4px; background: linear-gradient(to right, var(--gold), var(--flame)); transition: width 1s ease; }

    .btn-action {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 9px 18px; border-radius: 8px;
      font-family: var(--font-b); font-size: 0.82rem; font-weight: 700;
      background: linear-gradient(135deg, var(--gold), var(--flame));
      color: #fff; border: none; cursor: none;
      box-shadow: 0 4px 16px rgba(245,166,35,0.25);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .btn-action:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(245,166,35,0.4); }
    .btn-action-outline {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 9px 18px; border-radius: 8px;
      font-family: var(--font-b); font-size: 0.82rem; font-weight: 600;
      background: var(--glass); color: var(--silver);
      border: 1px solid var(--border); cursor: none;
      transition: border-color 0.2s, color 0.2s;
    }
    .btn-action-outline:hover { border-color: rgba(245,166,35,0.4); color: var(--gold); }

    /* ── WELCOME BANNER ── */
    .welcome-banner {
      background: linear-gradient(135deg, rgba(245,166,35,0.08) 0%, rgba(255,90,31,0.05) 100%);
      border: 1px solid rgba(245,166,35,0.2); border-radius: 18px;
      padding: 28px 32px; margin-bottom: 24px; position: relative; overflow: hidden;
    }
    .welcome-banner::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, var(--gold), var(--flame), transparent);
    }
    .welcome-banner h2 {
      font-family: var(--font-d); font-size: 1.5rem; font-weight: 900;
      color: var(--cream); letter-spacing: -0.3px; margin-bottom: 6px;
    }
    .welcome-banner p { font-size: 0.88rem; color: var(--silver); font-weight: 300; line-height: 1.6; }

    /* ── RESPONSIVE ── */
    @media (max-width: 1024px) { .stats-row { grid-template-columns: repeat(2,1fr); } }
    @media (max-width: 768px) {
      .sidebar { transform: translateX(calc(-1 * var(--sidebar-w))); }
      .sidebar.open { transform: translateX(0); }
      .main { margin-left: 0; padding: 20px 16px; }
      .grid-2 { grid-template-columns: 1fr; }
    }
    @media (max-width: 480px) {
      .stats-row { grid-template-columns: 1fr 1fr; }
      .topnav { padding: 0 14px; }
      .topnav-name { display: none; }
    }

    /* ── THEME TOGGLE IN SIDEBAR ── */
    .theme-toggle-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 20px; cursor: pointer; border: none; background: none;
      width: 100%; text-align: left; font-family: var(--font-b);
      transition: background 0.2s;
    }
    .theme-toggle-row:hover { background: var(--glass-b); }
    .theme-toggle-row-label {
      display: flex; align-items: center; gap: 12px;
      font-size: 0.86rem; font-weight: 500;
      color: rgba(226,232,240,0.6);
    }
    .theme-toggle-row-label .s-icon { font-size: 1rem; width: 20px; text-align: center; flex-shrink: 0; }
    .toggle-pill {
      width: 42px; height: 24px; border-radius: 24px; flex-shrink: 0;
      background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.15);
      position: relative; transition: background 0.3s, border-color 0.3s;
    }
    .toggle-pill::after {
      content: ''; position: absolute;
      width: 18px; height: 18px; border-radius: 50%;
      top: 2px; left: 2px;
      background: var(--muted);
      transition: transform 0.3s, background 0.3s;
    }
    .toggle-pill.on { background: rgba(245,166,35,0.3); border-color: rgba(245,166,35,0.5); }
    .toggle-pill.on::after { transform: translateX(18px); background: var(--gold); }

    /* ── MEMBERS TABLE ── */
    .members-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    .members-table th {
      text-align: left; padding: 10px 14px;
      font-family: var(--font-m); font-size: 0.62rem; font-weight: 700;
      letter-spacing: 1px; text-transform: uppercase; color: var(--muted);
      border-bottom: 1px solid var(--border);
    }
    .members-table td {
      padding: 12px 14px; color: var(--silver);
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .members-table tr:last-child td { border-bottom: none; }
    .members-table tr:hover td { background: rgba(255,255,255,0.02); }
    .status-badge {
      display: inline-block; padding: 3px 10px; border-radius: 100px;
      font-family: var(--font-m); font-size: 0.6rem; font-weight: 700; letter-spacing: 0.5px;
    }
    .status-badge.active   { background: rgba(16,185,129,0.12); color: #6ee7b7; }
    .status-badge.inactive { background: rgba(100,116,139,0.12); color: var(--muted); }
    .status-badge.pending  { background: rgba(245,166,35,0.12);  color: var(--gold); }
  </style>
</head>
<body>

<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursor-ring"></div>

<!-- TOP NAV -->
<nav class="topnav">
  <div class="topnav-left">
    <button class="sidebar-toggle" onclick="toggleSidebar()" aria-label="Toggle sidebar">
      <span></span><span></span><span></span>
    </button>
    <a href="index.html" class="nav-logo">
      <div class="logo-mark">C360</div>
      Innovation Lab
    </a>
  </div>
  <div class="topnav-right">
    <div class="topnav-bell" id="topnav-bell">
      <span class="topnav-bell-icon">🔔</span>
      <span class="topnav-bell-badge" id="topnav-bell-badge">3</span>
    </div>
    <div class="topnav-avatar-wrap">
      <div class="topnav-avatar" id="topnav-initial">U</div>
      <span class="topnav-name" id="topnav-name">User</span>
    </div>
  </div>
</nav>

<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-user">
      <div class="sidebar-avatar" id="sidebar-initial">U</div>
      <div>
        <div class="sidebar-uname" id="sidebar-name">User</div>
        <div class="sidebar-urole" id="sidebar-role">Member</div>
      </div>
    </div>
    <nav class="sidebar-nav" id="sidebar-nav"></nav>
    <div class="sidebar-logout-wrap" id="sidebar-logout-wrap"></div>
    <div class="sidebar-footer">© 2025 C360 Innovation Lab</div>
  </aside>

  <!-- MAIN AREA -->
  <main class="main" id="main">
    <div id="dashboard-content">
      <!-- injected by role -->
    </div>
  </main>

</div>

<!-- ROLE SWITCHER (dev tool — admin only) -->
<div id="role-switcher-wrap" style="display:none;position:fixed;bottom:20px;right:20px;z-index:9999;background:var(--deep);border:1px solid rgba(245,166,35,0.3);border-radius:12px;padding:10px 14px;display:flex;align-items:center;gap:10px;font-family:var(--font-m);font-size:0.65rem;">
  <span style="color:var(--gold);letter-spacing:1px;text-transform:uppercase;font-weight:700;">Dev: Role</span>
  <select id="role-switcher" style="background:var(--navy);color:var(--cream);border:1px solid var(--border);border-radius:6px;padding:4px 8px;font-family:var(--font-m);font-size:0.65rem;cursor:pointer;">
    <option value="student">Student</option>
    <option value="club-leader">Club Leader</option>
    <option value="admin">Admin</option>
    <option value="mentor">Mentor</option>
  </select>
</div>

<script>
  /* ── AUTH GUARD ── */
  const storedLogin = localStorage.getItem('c360_logged_in');
  if (!storedLogin) { window.location.href = 'login.html'; }

  const userName = localStorage.getItem('c360_username') || 'User';
  const userRole = localStorage.getItem('c360_role') || 'student';
  const userInitial = userName.charAt(0).toUpperCase();

  /* ── POPULATE SHARED ELEMENTS ── */
  document.getElementById('topnav-initial').textContent = userInitial;
  document.getElementById('topnav-name').textContent = userName.split(' ')[0];
  document.getElementById('sidebar-initial').textContent = userInitial;
  document.getElementById('sidebar-name').textContent = userName;
  document.getElementById('sidebar-role').textContent = userRole.replace('-', ' ');

  /* ── CURSOR ── */
  const cursor = document.getElementById('cursor');
  const ring   = document.getElementById('cursor-ring');
  let mx = -100, my = -100, rx = -100, ry = -100;
  document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
  (function animCursor() {
    if (cursor) { cursor.style.left = mx+'px'; cursor.style.top = my+'px'; }
    rx += (mx - rx) * 0.12; ry += (my - ry) * 0.12;
    if (ring) { ring.style.left = rx+'px'; ring.style.top = ry+'px'; }
    requestAnimationFrame(animCursor);
  })();
  document.querySelectorAll('a,button').forEach(el => {
    el.addEventListener('mouseenter', () => {
      if (cursor) cursor.style.transform = 'translate(-50%,-50%) scale(2.5)';
      if (ring) { ring.style.transform = 'translate(-50%,-50%) scale(1.5)'; ring.style.borderColor = 'rgba(245,166,35,0.9)'; }
    });
    el.addEventListener('mouseleave', () => {
      if (cursor) cursor.style.transform = 'translate(-50%,-50%) scale(1)';
      if (ring) { ring.style.transform = 'translate(-50%,-50%) scale(1)'; ring.style.borderColor = 'rgba(245,166,35,0.5)'; }
    });
  });

  /* ── SIDEBAR TOGGLE ── */
  const sidebar  = document.getElementById('sidebar');
  const mainEl   = document.getElementById('main');
  const overlay  = document.getElementById('overlay');
  const isDesktop = () => window.innerWidth > 768;
  function toggleSidebar() {
    if (isDesktop()) { sidebar.classList.toggle('collapsed'); mainEl.classList.toggle('expanded'); }
    else { sidebar.classList.toggle('open'); overlay.classList.toggle('show'); }
  }
