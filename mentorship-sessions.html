<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mentorship Sessions — C360 Innovation Lab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800;900&family=DM+Sans:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="global.css">
  <style>
    :root { --sidebar-w: 250px; }
    body { display: flex; flex-direction: column; min-height: 100vh; background: var(--navy); cursor: none; }

    /* ── TOP NAV ── */
    .topnav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 500;
      height: 72px; background: rgba(7,9,15,0.95);
      backdrop-filter: blur(24px) saturate(180%);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px;
      animation: navSlide 0.8s cubic-bezier(0.16,1,0.3,1) both;
    }
    @keyframes navSlide { from{transform:translateY(-100%);opacity:0} to{transform:translateY(0);opacity:1} }
    .topnav-left { display: flex; align-items: center; gap: 14px; }
    .sidebar-toggle {
      background: none; border: none; cursor: none;
      display: flex; flex-direction: column; gap: 5px; padding: 6px;
      border-radius: 8px; transition: background 0.2s;
    }
    .sidebar-toggle:hover { background: var(--glass-b); }
    .sidebar-toggle span { display: block; width: 22px; height: 2px; background: var(--silver); border-radius: 2px; }
    .topnav .nav-logo {
      font-family: var(--font-d); font-size: 1.15rem; font-weight: 900;
      color: var(--cream); white-space: nowrap;
      display: flex; align-items: center; gap: 10px;
    }
    .topnav-right { display: flex; align-items: center; gap: 12px; }
    .topnav-bell {
      position: relative; display: flex; align-items: center;
      cursor: none; padding: 8px; border-radius: 10px; transition: background 0.2s;
    }
    .topnav-bell:hover { background: var(--glass-b); }
    .topnav-bell-badge {
      position: absolute; top: 4px; right: 4px;
      min-width: 16px; height: 16px; padding: 0 4px;
      background: var(--flame); color: #fff;
      font-family: var(--font-m); font-size: 0.55rem; font-weight: 700;
      border-radius: 100px; display: flex; align-items: center; justify-content: center;
      border: 2px solid var(--ink);
    }
    .topnav-avatar-wrap {
      display: flex; align-items: center; gap: 8px;
      cursor: none; padding: 5px 12px 5px 5px;
      border-radius: 100px; border: 1px solid var(--border);
      background: var(--glass); transition: border-color 0.2s, background 0.2s;
    }
    .topnav-avatar-wrap:hover { border-color: rgba(245,166,35,0.4); background: var(--glass-b); }
    .topnav-avatar {
      width: 32px; height: 32px; border-radius: 50%;
      background: linear-gradient(135deg, var(--gold), var(--flame));
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-m); font-size: 0.75rem; font-weight: 700; color: #fff;
    }
    .topnav-name { font-size: 0.85rem; font-weight: 600; color: var(--cream); }

    /* ── LAYOUT ── */
    .layout { display: flex; margin-top: 72px; flex: 1; }

    /* ── SIDEBAR ── */
    .sidebar {
      width: var(--sidebar-w); flex-shrink: 0;
      background: var(--deep); border-right: 1px solid var(--border);
      min-height: calc(100vh - 72px);
      position: fixed; top: 72px; left: 0; bottom: 0;
      display: flex; flex-direction: column;
      transition: transform 0.3s ease; z-index: 150; overflow-y: auto;
    }
    .sidebar.collapsed { transform: translateX(calc(-1 * var(--sidebar-w))); }
    .sidebar-user {
      padding: 22px 20px 18px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 12px;
    }
    .sidebar-avatar {
      width: 42px; height: 42px; border-radius: 50%; flex-shrink: 0;
      background: linear-gradient(135deg, var(--gold), var(--flame));
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-m); font-size: 1rem; font-weight: 700; color: #fff;
      border: 2px solid rgba(245,166,35,0.3);
    }
    .sidebar-uname { font-size: 0.88rem; font-weight: 700; color: var(--cream); font-family: var(--font-d); }
    .sidebar-urole { font-size: 0.68rem; color: var(--muted); margin-top: 2px; font-family: var(--font-m); text-transform: capitalize; }
    .sidebar-nav { padding: 12px 0; flex: 1; }
    .nav-section-label {
      font-family: var(--font-m); font-size: 0.62rem; font-weight: 700;
      letter-spacing: 1.5px; text-transform: uppercase;
      color: rgba(245,166,35,0.35); padding: 14px 20px 5px;
    }
    .sidebar-link {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 20px; color: rgba(226,232,240,0.6);
      font-size: 0.86rem; font-weight: 500;
      transition: background 0.2s, color 0.2s;
      cursor: none; border: none; background: none;
      width: 100%; text-align: left; font-family: var(--font-b);
      border-right: 3px solid transparent;
    }
    .sidebar-link:hover { background: var(--glass-b); color: var(--cream); }
    .sidebar-link.active { background: rgba(245,166,35,0.1); color: var(--gold); font-weight: 700; border-right-color: var(--gold); }
    .sidebar-link .s-icon { font-size: 1rem; width: 20px; text-align: center; flex-shrink: 0; }
    .sidebar-link.logout-link { color: rgba(252,165,165,0.7); }
    .sidebar-link.logout-link:hover { background: rgba(239,68,68,0.08); color: #f87171; }
    .sidebar-footer { padding: 14px 20px; border-top: 1px solid var(--border); font-family: var(--font-m); font-size: 0.65rem; color: rgba(245,166,35,0.25); letter-spacing: 1px; }

    /* ── MAIN ── */
    .main { margin-left: var(--sidebar-w); flex: 1; padding: 32px 28px; transition: margin-left 0.3s ease; min-width: 0; }
    .main.expanded { margin-left: 0; }
    .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 140; }
    .overlay.show { display: block; }

    /* ── SHARED ── */
    .section-card { background: var(--glass); border: 1px solid var(--border); border-radius: 14px; padding: 24px; margin-bottom: 20px; }
    .section-card:last-child { margin-bottom: 0; }
    .section-card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
    .section-card-header h2 { font-family: var(--font-d); font-size: 1rem; font-weight: 800; color: var(--cream); }
    .status-badge { display: inline-block; padding: 3px 10px; border-radius: 100px; font-family: var(--font-m); font-size: 0.6rem; font-weight: 700; letter-spacing: 0.5px; }
    .status-badge.active     { background: rgba(16,185,129,0.12);  color: #6ee7b7; }
    .status-badge.inactive   { background: rgba(100,116,139,0.12); color: var(--muted); }
    .status-badge.pending    { background: rgba(245,166,35,0.12);  color: var(--gold); }
    .status-badge.cancelled  { background: rgba(239,68,68,0.1);    color: #f87171; }
    .btn-action {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 9px 20px; border-radius: 9px;
      font-family: var(--font-b); font-size: 0.82rem; font-weight: 700;
      background: linear-gradient(135deg, var(--gold), var(--flame));
      color: #fff; border: none; cursor: none;
      box-shadow: 0 4px 16px rgba(245,166,35,0.25);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .btn-action:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(245,166,35,0.4); }
    .btn-action-outline {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 9px 20px; border-radius: 9px;
      font-family: var(--font-b); font-size: 0.82rem; font-weight: 600;
      background: var(--glass); color: var(--silver);
      border: 1px solid var(--border); cursor: none;
      transition: border-color 0.2s, color 0.2s;
    }
    .btn-action-outline:hover { border-color: rgba(245,166,35,0.4); color: var(--gold); }
    .members-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    .members-table th { text-align: left; padding: 10px 14px; font-family: var(--font-m); font-size: 0.62rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); border-bottom: 1px solid var(--border); }
    .members-table td { padding: 12px 14px; color: var(--silver); border-bottom: 1px solid rgba(255,255,255,0.04); }
    .members-table tr:last-child td { border-bottom: none; }
    .members-table tr:hover td { background: rgba(255,255,255,0.02); }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      .sidebar { transform: translateX(calc(-1 * var(--sidebar-w))); }
      .sidebar.open { transform: translateX(0); }
      .main { margin-left: 0; padding: 20px 16px; }
    }
    @media (max-width: 480px) { .topnav { padding: 0 14px; } .topnav-name { display: none; } }

    /* ── PAGE HEADER ── */
    .page-header { margin-bottom: 24px; }
    .page-header h1 { font-family: var(--font-d); font-size: 1.8rem; font-weight: 900; color: var(--cream); letter-spacing: -0.5px; }
    .page-header p { font-size: 0.85rem; color: var(--muted); margin-top: 4px; font-family: var(--font-m); }

    /* ── TAB SWITCHER ── */
    .tab-bar {
      display: flex; gap: 6px; margin-bottom: 28px;
      border-bottom: 1px solid var(--border);
    }
    .tab-btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 20px; border-radius: 10px 10px 0 0;
      font-family: var(--font-b); font-size: 0.83rem; font-weight: 600;
      color: var(--muted); background: none; border: none;
      border-bottom: 2px solid transparent; cursor: none;
      transition: color 0.2s, border-color 0.2s, background 0.2s;
      margin-bottom: -1px;
    }
    .tab-btn:hover { color: var(--silver); background: var(--glass-b); }
    .tab-btn.active { color: var(--gold); border-bottom-color: var(--gold); background: rgba(245,166,35,0.05); }

    /* ── TAB PANELS ── */
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── MENTORS GRID ── */
    .mentors-grid {
      display: grid; grid-template-columns: repeat(2,1fr); gap: 20px;
    }
    .mentor-card {
      background: var(--glass); border: 1px solid var(--border);
      border-radius: 16px; padding: 24px;
      display: flex; flex-direction: column; gap: 14px;
      transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
      position: relative; overflow: hidden;
    }
    .mentor-card:hover { border-color: var(--border-h); transform: translateY(-3px); box-shadow: 0 12px 32px rgba(0,0,0,0.3); }
    .mentor-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, var(--gold), var(--flame), transparent);
      opacity: 0; transition: opacity 0.2s;
    }
    .mentor-card:hover::before { opacity: 1; }
    .mentor-card-top { display: flex; align-items: center; gap: 14px; }
    .mentor-avatar {
      width: 52px; height: 52px; border-radius: 50%; flex-shrink: 0;
      background: linear-gradient(135deg, var(--gold), var(--flame));
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-d); font-size: 1.2rem; font-weight: 900; color: #fff;
      border: 2px solid rgba(245,166,35,0.3);
    }
    .mentor-name { font-family: var(--font-d); font-size: 1rem; font-weight: 800; color: var(--cream); margin-bottom: 3px; }
    .mentor-title { font-family: var(--font-m); font-size: 0.68rem; font-weight: 700; color: var(--gold); letter-spacing: 0.8px; text-transform: uppercase; }
    .mentor-bio { font-size: 0.82rem; color: var(--silver); line-height: 1.7; font-weight: 300; flex: 1; }
    .mentor-tags { display: flex; flex-wrap: wrap; gap: 6px; }
    .mentor-tag {
      background: rgba(245,166,35,0.08); border: 1px solid rgba(245,166,35,0.18);
      color: var(--gold); font-family: var(--font-m); font-size: 0.62rem; font-weight: 700;
      padding: 3px 10px; border-radius: 100px; letter-spacing: 0.5px;
    }
    .mentor-card-footer {
      display: flex; align-items: center; justify-content: space-between;
      padding-top: 14px; border-top: 1px solid var(--border);
    }
    .mentor-sessions-count { font-family: var(--font-m); font-size: 0.65rem; color: var(--muted); }
    @media (max-width: 860px) { .mentors-grid { grid-template-columns: 1fr; } }

    /* ── MY SESSIONS ── */
    .sessions-list { display: flex; flex-direction: column; gap: 12px; }
    .session-item {
      display: flex; align-items: center; gap: 16px;
      padding: 16px 18px; border-radius: 12px;
      background: rgba(255,255,255,0.03); border: 1px solid var(--border);
      transition: border-color 0.2s, background 0.2s; flex-wrap: wrap;
    }
    .session-item:hover { border-color: var(--border-h); background: var(--glass-b); }
    .session-avatar {
      width: 44px; height: 44px; border-radius: 50%; flex-shrink: 0;
      background: linear-gradient(135deg, var(--gold), var(--flame));
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-d); font-size: 1rem; font-weight: 900; color: #fff;
      border: 2px solid rgba(245,166,35,0.25);
    }
    .session-body { flex: 1; min-width: 160px; }
    .session-mentor-name { font-size: 0.88rem; font-weight: 700; color: var(--cream); margin-bottom: 4px; }
    .session-meta {
      display: flex; gap: 14px; flex-wrap: wrap;
      font-family: var(--font-m); font-size: 0.62rem; letter-spacing: 0.8px; color: var(--muted);
    }
    .session-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; flex-wrap: wrap; }
    .btn-join {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 7px 16px; border-radius: 8px; cursor: none;
      font-family: var(--font-b); font-size: 0.78rem; font-weight: 700;
      background: rgba(16,185,129,0.1); color: #6ee7b7;
      border: 1px solid rgba(16,185,129,0.25);
      transition: background 0.2s, border-color 0.2s;
    }
    .btn-join:hover { background: rgba(16,185,129,0.18); border-color: rgba(16,185,129,0.5); }
    .btn-join.disabled { opacity: 0.35; pointer-events: none; }
    .empty-state {
      text-align: center; padding: 48px 24px;
      color: var(--muted); font-family: var(--font-m); font-size: 0.85rem;
    }
    .empty-state-icon { font-size: 2.4rem; margin-bottom: 12px; }
    .empty-state p { margin-bottom: 16px; line-height: 1.6; }

    /* ── MENTOR SCHEDULE ── */
    .request-item {
      display: flex; align-items: center; gap: 16px;
      padding: 14px 0; border-bottom: 1px solid var(--border); flex-wrap: wrap;
    }
    .request-item:last-child { border-bottom: none; }
    .request-avatar {
      width: 40px; height: 40px; border-radius: 50%; flex-shrink: 0;
      background: rgba(245,166,35,0.1); border: 1px solid rgba(245,166,35,0.2);
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-d); font-size: 0.95rem; font-weight: 900; color: var(--gold);
    }
    .request-body { flex: 1; min-width: 140px; }
    .request-name { font-size: 0.88rem; font-weight: 700; color: var(--cream); margin-bottom: 3px; }
    .request-meta { font-family: var(--font-m); font-size: 0.62rem; color: var(--muted); letter-spacing: 0.5px; }
    .request-actions { display: flex; gap: 8px; flex-shrink: 0; }
    .btn-accept {
      padding: 6px 14px; border-radius: 7px; cursor: none;
      font-family: var(--font-b); font-size: 0.75rem; font-weight: 700;
      background: rgba(16,185,129,0.1); color: #6ee7b7;
      border: 1px solid rgba(16,185,129,0.25);
      transition: background 0.2s, border-color 0.2s;
    }
    .btn-accept:hover { background: rgba(16,185,129,0.2); border-color: rgba(16,185,129,0.5); }
    .btn-decline {
      padding: 6px 14px; border-radius: 7px; cursor: none;
      font-family: var(--font-b); font-size: 0.75rem; font-weight: 700;
      background: transparent; color: rgba(252,165,165,0.6);
      border: 1px solid rgba(239,68,68,0.2);
      transition: background 0.2s, border-color 0.2s, color 0.2s;
    }
    .btn-decline:hover { background: rgba(239,68,68,0.08); border-color: rgba(239,68,68,0.5); color: #f87171; }
    .upcoming-item {
      display: flex; align-items: center; gap: 16px;
      padding: 12px 14px; border-radius: 10px;
      background: rgba(255,255,255,0.03); border: 1px solid var(--border);
      transition: border-color 0.2s; flex-wrap: wrap;
    }
    .upcoming-item:hover { border-color: var(--border-h); }
    .upcoming-date-box {
      width: 46px; flex-shrink: 0; text-align: center;
      background: linear-gradient(135deg, var(--gold), var(--flame));
      color: #fff; border-radius: 10px; padding: 7px 4px;
    }
    .u-day { font-family: var(--font-d); font-size: 1.2rem; font-weight: 900; line-height: 1; }
    .u-mon { font-family: var(--font-m); font-size: 0.58rem; font-weight: 700; text-transform: uppercase; margin-top: 2px; }
    .upcoming-body { flex: 1; min-width: 140px; }
    .upcoming-name { font-size: 0.88rem; font-weight: 700; color: var(--cream); margin-bottom: 4px; }
    .upcoming-meta { font-family: var(--font-m); font-size: 0.62rem; color: var(--muted); letter-spacing: 0.5px; }
    .upcoming-list { display: flex; flex-direction: column; gap: 10px; }

    /* ── POST A RESOURCE ── */
    .resource-form { display: none; margin-top: 20px; }
    .resource-form.open { display: block; }
    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: 0.8rem; font-weight: 600; color: var(--silver); margin-bottom: 6px; }
    .field input, .field textarea, .field select {
      width: 100%; padding: 10px 13px;
      background: rgba(255,255,255,0.04); border: 1px solid var(--border);
      border-radius: 9px; color: var(--text); font-size: 0.86rem;
      font-family: var(--font-b); outline: none; transition: border-color 0.2s;
    }
    .field input:focus, .field textarea:focus, .field select:focus { border-color: rgba(245,166,35,0.5); }
    .field input::placeholder, .field textarea::placeholder { color: var(--muted); }
    .field select option { background: var(--navy); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .resource-toggle { display: flex; gap: 8px; margin-bottom: 14px; }
    .toggle-btn {
      padding: 6px 16px; border-radius: 8px; cursor: none;
      font-family: var(--font-b); font-size: 0.78rem; font-weight: 600;
      background: var(--glass); color: var(--muted);
      border: 1px solid var(--border); transition: all 0.2s;
    }
    .toggle-btn.active { background: rgba(245,166,35,0.1); color: var(--gold); border-color: rgba(245,166,35,0.35); }
    .admin-divider { border: none; border-top: 1px solid var(--border); margin: 28px 0; }
    @media (max-width: 560px) { .form-row { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursor-ring"></div>

<!-- TOP NAV -->
<nav class="topnav">
  <div class="topnav-left">
    <button class="sidebar-toggle" onclick="toggleSidebar()" aria-label="Toggle sidebar">
      <span></span><span></span><span></span>
    </button>
    <a href="index.html" class="nav-logo">
      <div class="logo-mark">C360</div>
      Innovation Lab
    </a>
  </div>
  <div class="topnav-right">
    <div class="topnav-bell" id="topnav-bell">
      <span style="font-size:1.1rem;">🔔</span>
      <span class="topnav-bell-badge" id="topnav-bell-badge">3</span>
    </div>
    <div class="topnav-avatar-wrap">
      <div class="topnav-avatar" id="topnav-initial">U</div>
      <span class="topnav-name" id="topnav-name">User</span>
    </div>
  </div>
</nav>

<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<div class="layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-user">
      <div class="sidebar-avatar" id="sidebar-initial">U</div>
      <div>
        <div class="sidebar-uname" id="sidebar-name">User</div>
        <div class="sidebar-urole" id="sidebar-role">Member</div>
      </div>
    </div>
    <nav class="sidebar-nav" id="sidebar-nav"></nav>
    <div class="sidebar-logout-wrap" id="sidebar-logout-wrap"></div>
    <div class="sidebar-footer">© 2025 C360 Innovation Lab</div>
  </aside>

  <main class="main" id="main">
    <div id="ms-content"></div>
  </main>
</div>

<script>
  /* ── AUTH GUARD ── */
  if (!localStorage.getItem('c360_logged_in')) { window.location.href = 'login.html'; }

  const userName    = localStorage.getItem('c360_username') || 'User';
  const userRole    = localStorage.getItem('c360_role') || 'student';
  const userInitial = userName.charAt(0).toUpperCase();

  /* ── POPULATE SHELL ── */
  document.getElementById('topnav-initial').textContent  = userInitial;
  document.getElementById('topnav-name').textContent     = userName.split(' ')[0];
  document.getElementById('sidebar-initial').textContent = userInitial;
  document.getElementById('sidebar-name').textContent    = userName;
  document.getElementById('sidebar-role').textContent    = userRole.replace('-', ' ');

  /* ── CURSOR ── */
  const cursor = document.getElementById('cursor');
  const ring   = document.getElementById('cursor-ring');
  let mx = -100, my = -100, rx = -100, ry = -100;
  document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
  (function animCursor() {
    if (cursor) { cursor.style.left = mx+'px'; cursor.style.top = my+'px'; }
    rx += (mx - rx) * 0.12; ry += (my - ry) * 0.12;
    if (ring) { ring.style.left = rx+'px'; ring.style.top = ry+'px'; }
    requestAnimationFrame(animCursor);
  })();
  document.querySelectorAll('a,button').forEach(el => {
    el.addEventListener('mouseenter', () => {
      if (cursor) cursor.style.transform = 'translate(-50%,-50%) scale(2.5)';
      if (ring) { ring.style.transform = 'translate(-50%,-50%) scale(1.5)'; ring.style.borderColor = 'rgba(245,166,35,0.9)'; }
    });
    el.addEventListener('mouseleave', () => {
      if (cursor) cursor.style.transform = 'translate(-50%,-50%) scale(1)';
      if (ring) { ring.style.transform = 'translate(-50%,-50%) scale(1)'; ring.style.borderColor = 'rgba(245,166,35,0.5)'; }
    });
  });

  /* ── SIDEBAR TOGGLE ── */
  const sidebar   = document.getElementById('sidebar');
  const mainEl    = document.getElementById('main');
  const overlay   = document.getElementById('overlay');
  const isDesktop = () => window.innerWidth > 768;
  function toggleSidebar() {
    if (isDesktop()) { sidebar.classList.toggle('collapsed'); mainEl.classList.toggle('expanded'); }
    else { sidebar.classList.toggle('open'); overlay.classList.toggle('show'); }
  }
  function closeSidebar() { sidebar.classList.remove('open'); overlay.classList.remove('show'); }
  window.addEventListener('resize', () => { if (isDesktop()) { sidebar.classList.remove('open'); overlay.classList.remove('show'); } });
  function setActive(el) {
    document.querySelectorAll('.sidebar-link').forEach(l => l.classList.remove('active'));
    el.classList.add('active');
    if (!isDesktop()) closeSidebar();
  }
  function handleLogout() {
    ['c360_logged_in','c360_username','c360_role','c360_email'].forEach(k => localStorage.removeItem(k));
    window.location.href = 'index.html';
  }
  document.getElementById('topnav-bell').addEventListener('click', () => {
    document.getElementById('topnav-bell-badge').style.display = 'none';
  });

  /* ── SIDEBAR LINKS ── */
  const commonTop = `
    <div class="nav-section-label">Main</div>
    <button class="sidebar-link" onclick="setActive(this);window.location.href='dashboard.html'"><span class="s-icon">🏠</span> Dashboard</button>
    <button class="sidebar-link" onclick="setActive(this);window.location.href='profile.html'"><span class="s-icon">👤</span> My Profile</button>
    <button class="sidebar-link" onclick="setActive(this);window.location.href='my-club.html'"><span class="s-icon">🌱</span> My Club</button>
    <div class="nav-section-label">Programs</div>
    <button class="sidebar-link" onclick="setActive(this);window.location.href='competitions.html'"><span class="s-icon">🏆</span> Competitions</button>
    <button class="sidebar-link" onclick="setActive(this);window.location.href='incubation.html'"><span class="s-icon">🚀</span> Apply for Incubation</button>
    <button class="sidebar-link active" onclick="setActive(this)"><span class="s-icon">🤝</span> Mentorship Sessions</button>
    <div class="nav-section-label">Resources</div>
    <button class="sidebar-link" onclick="setActive(this);window.location.href='resources.html'"><span class="s-icon">📚</span> Resources</button>
    <button class="sidebar-link" onclick="setActive(this);window.location.href='notifications.html'"><span class="s-icon">🔔</span> Notifications</button>
  `;
  const logoutLink = `
    <div class="nav-section-label">Account</div>
    <button class="sidebar-link logout-link" onclick="handleLogout()"><span class="s-icon">🚪</span> Logout</button>
  `;
  const clubLeaderExtra = `
    <div class="nav-section-label">Club Management</div>
    <button class="sidebar-link" onclick="setActive(this);window.location.href='my-club.html'"><span class="s-icon">🛠️</span> Manage My Club</button>
  `;
  const adminExtra = `
    <div class="nav-section-label">Administration</div>
    <button class="sidebar-link" onclick="setActive(this)"><span class="s-icon">🌍</span> All Clubs</button>
    <button class="sidebar-link" onclick="setActive(this)"><span class="s-icon">👥</span> User Management</button>
    <button class="sidebar-link" onclick="setActive(this)"><span class="s-icon">📊</span> Analytics</button>
    <button class="sidebar-link" onclick="setActive(this)"><span class="s-icon">📝</span> Content Management</button>
  `;
  const mentorExtra = `
    <div class="nav-section-label">Mentor Tools</div>
    <button class="sidebar-link" onclick="setActive(this)"><span class="s-icon">👥</span> My Mentees</button>
    <button class="sidebar-link" onclick="setActive(this)"><span class="s-icon">📅</span> Scheduled Sessions</button>
    <button class="sidebar-link" onclick="setActive(this)"><span class="s-icon">📤</span> Post Resources</button>
  `;

  const sidebarNav = document.getElementById('sidebar-nav');
  if (userRole === 'club-leader') sidebarNav.innerHTML = commonTop + clubLeaderExtra;
  else if (userRole === 'admin')  sidebarNav.innerHTML = commonTop + adminExtra;
  else if (userRole === 'mentor') sidebarNav.innerHTML = commonTop + mentorExtra;
  else                            sidebarNav.innerHTML = commonTop;
  document.getElementById('sidebar-logout-wrap').innerHTML = logoutLink;

  /* ── SECTION A: PAGE HEADER + TAB SWITCHER ── */
  const now = new Date();
  const days   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const dateStr = days[now.getDay()] + ', ' + now.getDate() + ' ' + months[now.getMonth()] + ' ' + now.getFullYear();

  const isMentor = userRole === 'mentor';

  /* tabs differ by role */
  const tab1 = isMentor ? { id: 'schedule',  label: '📅 My Schedule'       } : { id: 'mentors',  label: '🤝 Available Mentors' };
  const tab2 = isMentor ? { id: 'conducted', label: '✅ Sessions Conducted' } : { id: 'sessions', label: '📋 My Sessions'         };

  document.getElementById('ms-content').innerHTML = `
    <div class="page-header">
      <h1>Mentorship Sessions 🤝</h1>
      <p>${dateStr}</p>
    </div>

    <div class="tab-bar">
      <button class="tab-btn active" data-tab="${tab1.id}" onclick="switchTab('${tab1.id}',this)">${tab1.label}</button>
      <button class="tab-btn"        data-tab="${tab2.id}" onclick="switchTab('${tab2.id}',this)">${tab2.label}</button>
    </div>

    <div class="tab-panel active" id="tab-${tab1.id}"><!-- injected by section B or D --></div>
    <div class="tab-panel"        id="tab-${tab2.id}"><!-- injected by section C or D --></div>
    <div id="mentor-resource-panel"><!-- Section E injected here --></div>
  `;

  /* ── TAB LOGIC ── */
  function switchTab(name, btn) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-' + name).classList.add('active');
  }

  /* ── SECTION B: AVAILABLE MENTORS ── */
  const mentors = [
    {
      initial: 'D', name: 'David Ochieng', title: 'Tech Entrepreneur',
      bio: 'Software engineer and startup founder with 10+ years building tech products across East Africa. Mentors youth in coding, product development, and launching tech startups.',
      tags: ['Software Dev', 'Startups', 'Product'], sessions: 42
    },
    {
      initial: 'G', name: 'Grace Nakato', title: 'Business Strategist',
      bio: 'Business consultant and social entrepreneur who has helped 50+ youth-led enterprises launch and scale. Specialises in strategy, financial planning, and market entry.',
      tags: ['Strategy', 'Finance', 'Enterprise'], sessions: 38
    },
    {
      initial: 'S', name: 'Samuel Byaruhanga', title: 'Research & Innovation Lead',
      bio: 'PhD in Innovation Management. Leads research initiatives at a leading Ugandan university. Guides students in research methodology, critical thinking, and academic careers.',
      tags: ['Research', 'Academia', 'Innovation'], sessions: 29
    },
    {
      initial: 'L', name: 'Lydia Atim', title: 'Social Impact Designer',
      bio: 'Design thinking facilitator and community development specialist. Works with youth to design solutions for health, education, and climate challenges across Uganda.',
      tags: ['Design Thinking', 'Social Impact', 'Climate'], sessions: 24
    }
  ];

  const isAdmin = userRole === 'admin';

  if (!isMentor) {
    const mentorCards = mentors.map(m => `
      <div class="mentor-card">
        <div class="mentor-card-top">
          <div class="mentor-avatar">${m.initial}</div>
          <div>
            <div class="mentor-name">${m.name}</div>
            <div class="mentor-title">${m.title}</div>
          </div>
        </div>
        <div class="mentor-bio">${m.bio}</div>
        <div class="mentor-tags">${m.tags.map(t => `<span class="mentor-tag">${t}</span>`).join('')}</div>
        <div class="mentor-card-footer">
          <span class="mentor-sessions-count">💬 ${m.sessions} sessions completed</span>
          ${isAdmin
            ? `<button class="btn-action-outline" disabled style="opacity:0.4;pointer-events:none;">Read Only</button>`
            : `<button class="btn-action" onclick="alert('Booking coming soon')">Book a Session →</button>`
          }
        </div>
      </div>
    `).join('');

    document.getElementById('tab-mentors').innerHTML =
      `<div class="mentors-grid">${mentorCards}</div>`;
  }

  /* ── SECTION C: MY SESSIONS ── */
  if (!isMentor) {
    const mySessions = [
      { initial:'D', mentor:'David Ochieng',    date:'Thu 17 Jul 2025', time:'10:00 AM', type:'1-on-1',  status:'active',    link:'#' },
      { initial:'L', mentor:'Lydia Atim',        date:'Sat 19 Jul 2025', time:'2:00 PM',  type:'Group',   status:'active',    link:'#' },
      { initial:'G', mentor:'Grace Nakato',      date:'Mon 7 Jul 2025',  time:'11:00 AM', type:'1-on-1',  status:'inactive',  link:null },
      { initial:'S', mentor:'Samuel Byaruhanga', date:'Wed 2 Jul 2025',  time:'3:00 PM',  type:'1-on-1',  status:'inactive',  link:null },
      { initial:'D', mentor:'David Ochieng',     date:'Fri 20 Jun 2025', time:'9:00 AM',  type:'1-on-1',  status:'cancelled', link:null },
    ];

    const statusLabel = { active: 'Upcoming', inactive: 'Completed', cancelled: 'Cancelled' };

    const sessionItems = mySessions.map(s => `
      <div class="session-item">
        <div class="session-avatar">${s.initial}</div>
        <div class="session-body">
          <div class="session-mentor-name">${s.mentor}</div>
          <div class="session-meta">
            <span>📅 ${s.date}</span>
            <span>⏰ ${s.time}</span>
            <span>💬 ${s.type}</span>
          </div>
        </div>
        <div class="session-right">
          <span class="status-badge ${s.status}">${statusLabel[s.status]}</span>
          ${s.link
            ? `<a href="${s.link}" class="btn-join">🔗 Join Meeting</a>`
            : `<button class="btn-join disabled" disabled>🔗 Join Meeting</button>`
          }
        </div>
      </div>
    `).join('');

    document.getElementById('tab-sessions').innerHTML = `
      <div class="section-card">
        <div class="section-card-header">
          <h2>My Booked Sessions</h2>
          <span style="font-size:0.72rem;color:var(--muted);font-family:var(--font-m);">${mySessions.length} total</span>
        </div>
        <div class="sessions-list">${sessionItems}</div>
      </div>
    `;
  }

  /* ── SECTION D: MENTOR SCHEDULE ── */
  if (isMentor) {
    const requests = [
      { initial:'A', name:'Aisha Nakato',    program:'Digital Skills Bootcamp',    date:'Thu 17 Jul', time:'10:00 AM' },
      { initial:'B', name:'Brian Okello',    program:'Entrepreneurship Intensive',  date:'Fri 18 Jul', time:'2:00 PM'  },
      { initial:'C', name:'Christine Atim',  program:'Design Thinking Workshop',    date:'Mon 21 Jul', time:'11:00 AM' },
    ];

    const upcoming = [
      { day:'17', mon:'Jul', mentee:'Aisha Nakato',   type:'1-on-1', time:'10:00 AM', link:'#' },
      { day:'19', mon:'Jul', mentee:'Cohort 3 Group', type:'Group',  time:'2:00 PM',  link:'#' },
      { day:'24', mon:'Jul', mentee:'Christine Atim', type:'1-on-1', time:'11:00 AM', link:'#' },
      { day:'28', mon:'Jul', mentee:'David Mugisha',  type:'1-on-1', time:'3:00 PM',  link:'#' },
    ];

    const conducted = [
      { initial:'E', mentor:'Esther Nambi',    date:'Mon 7 Jul 2025',  time:'9:00 AM',  type:'1-on-1', status:'inactive' },
      { initial:'F', mentor:'Felix Opio',      date:'Wed 2 Jul 2025',  time:'2:00 PM',  type:'1-on-1', status:'inactive' },
      { initial:'A', mentor:'Aisha Nakato',    date:'Fri 27 Jun 2025', time:'10:00 AM', type:'1-on-1', status:'inactive' },
      { initial:'B', mentor:'Brian Okello',    date:'Mon 23 Jun 2025', time:'3:00 PM',  type:'Group',  status:'inactive' },
    ];

    /* pending requests with live accept/decline */
    let pendingRequests = [...requests];

    function renderRequests() {
      const el = document.getElementById('pending-requests-list');
      if (!el) return;
      if (!pendingRequests.length) {
        el.innerHTML = `<div class="empty-state"><div class="empty-state-icon">✅</div><p>No pending requests.</p></div>`;
        return;
      }
      el.innerHTML = pendingRequests.map((r, i) => `
        <div class="request-item">
          <div class="request-avatar">${r.initial}</div>
          <div class="request-body">
            <div class="request-name">${r.name}</div>
            <div class="request-meta">${r.program} &nbsp;·&nbsp; ${r.date} &nbsp;·&nbsp; ${r.time}</div>
          </div>
          <div class="request-actions">
            <button class="btn-accept" onclick="resolveRequest(${i},'accept')">&#10003; Accept</button>
            <button class="btn-decline" onclick="resolveRequest(${i},'decline')">&#10005; Decline</button>
          </div>
        </div>
      `).join('');
    }

    function resolveRequest(idx, action) {
      pendingRequests.splice(idx, 1);
      renderRequests();
      const count = document.getElementById('pending-count');
      if (count) count.textContent = pendingRequests.length + ' pending';
    }

    const upcomingItems = upcoming.map(u => `
      <div class="upcoming-item">
        <div class="upcoming-date-box">
          <div class="u-day">${u.day}</div>
          <div class="u-mon">${u.mon}</div>
        </div>
        <div class="upcoming-body">
          <div class="upcoming-name">${u.mentee}</div>
          <div class="upcoming-meta">${u.time} &nbsp;·&nbsp; ${u.type}</div>
        </div>
        <a href="${u.link}" class="btn-join">🔗 Join</a>
      </div>
    `).join('');

    const conductedItems = conducted.map(s => `
      <div class="session-item">
        <div class="session-avatar">${s.initial}</div>
        <div class="session-body">
          <div class="session-mentor-name">${s.mentor}</div>
          <div class="session-meta">
            <span>📅 ${s.date}</span>
            <span>⏰ ${s.time}</span>
            <span>💬 ${s.type}</span>
          </div>
        </div>
        <div class="session-right">
          <span class="status-badge inactive">Completed</span>
        </div>
      </div>
    `).join('');

    document.getElementById('tab-schedule').innerHTML = `
      <div class="section-card">
        <div class="section-card-header">
          <h2>Pending Requests</h2>
          <span id="pending-count" style="font-size:0.72rem;color:var(--gold);font-family:var(--font-m);font-weight:700;">${requests.length} pending</span>
        </div>
        <div id="pending-requests-list"></div>
      </div>
      <div class="section-card">
        <div class="section-card-header"><h2>Upcoming Sessions</h2></div>
        <div class="upcoming-list">${upcomingItems}</div>
      </div>
    `;

    document.getElementById('tab-conducted').innerHTML = `
      <div class="section-card">
        <div class="section-card-header">
          <h2>Sessions Conducted</h2>
          <span style="font-size:0.72rem;color:var(--muted);font-family:var(--font-m);">${conducted.length} total</span>
        </div>
        <div class="sessions-list">${conductedItems}</div>
      </div>
    `;

    renderRequests();
  }

  /* ── SECTION E: POST A RESOURCE (mentor only) ── */
  if (isMentor) {
    let uploadMode = 'link';

    document.getElementById('mentor-resource-panel').innerHTML = `
      <hr class="admin-divider"/>
      <div class="section-card">
        <div class="section-card-header">
          <h2>📚 Post a Resource</h2>
          <button class="btn-action" onclick="toggleResourceForm()">+ Post Resource</button>
        </div>
        <div class="resource-form" id="resource-form">
          <div class="form-row">
            <div class="field">
              <label>Resource Title</label>
              <input type="text" id="rf-title" placeholder="e.g. Design Thinking Workbook"/>
            </div>
            <div class="field">
              <label>Category</label>
              <select id="rf-category">
                <option value="">-- Select category --</option>
                <option value="guide">Guide</option>
                <option value="template">Template</option>
                <option value="research">Research</option>
                <option value="tool">Tool</option>
                <option value="video">Video</option>
              </select>
            </div>
          </div>
          <div class="field">
            <label>Description</label>
            <textarea id="rf-desc" rows="3" placeholder="Briefly describe what this resource covers and who it is for..."></textarea>
          </div>
          <div class="field">
            <label>Resource Type</label>
            <div class="resource-toggle">
              <button class="toggle-btn active" id="toggle-link" onclick="setUploadMode('link')">&#x1F517; Link</button>
              <button class="toggle-btn" id="toggle-file" onclick="setUploadMode('file')">&#x1F4CE; File Upload</button>
            </div>
            <div id="rf-link-wrap">
              <input type="url" id="rf-link" placeholder="https://docs.google.com/..."/>
            </div>
            <div id="rf-file-wrap" style="display:none;">
              <input type="file" id="rf-file" accept=".pdf,.doc,.docx,.ppt,.pptx,.xls,.xlsx"
                style="padding:8px;color:var(--silver);cursor:pointer;"/>
            </div>
          </div>
          <div style="display:flex;gap:10px;margin-top:4px;">
            <button class="btn-action" onclick="submitResource()">Submit Resource</button>
            <button class="btn-action-outline" onclick="toggleResourceForm()">Cancel</button>
          </div>
          <div id="rf-success" style="display:none;margin-top:14px;
            background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.3);
            color:#6ee7b7;border-radius:9px;padding:11px 16px;
            font-size:0.85rem;font-weight:600;font-family:var(--font-m);">
            ✅ Resource submitted! It will appear on the Resources page after review.
          </div>
        </div>
      </div>
    `;
  }

  function toggleResourceForm() {
    document.getElementById('resource-form').classList.toggle('open');
    document.getElementById('rf-success').style.display = 'none';
  }

  function setUploadMode(mode) {
    uploadMode = mode;
    document.getElementById('rf-link-wrap').style.display = mode === 'link' ? '' : 'none';
    document.getElementById('rf-file-wrap').style.display = mode === 'file' ? '' : 'none';
    document.getElementById('toggle-link').classList.toggle('active', mode === 'link');
    document.getElementById('toggle-file').classList.toggle('active', mode === 'file');
  }

  function submitResource() {
    const title = document.getElementById('rf-title').value.trim();
    const cat   = document.getElementById('rf-category').value;
    if (!title || !cat) {
      if (!title) document.getElementById('rf-title').style.borderColor = '#ef4444';
      if (!cat)   document.getElementById('rf-category').style.borderColor = '#ef4444';
      return;
    }
    document.getElementById('rf-success').style.display = 'block';
    document.getElementById('rf-title').value = '';
    document.getElementById('rf-category').value = '';
    document.getElementById('rf-desc').value = '';
    document.getElementById('rf-link').value = '';
    setTimeout(() => {
      document.getElementById('resource-form').classList.remove('open');
      document.getElementById('rf-success').style.display = 'none';
    }, 3000);
  }
</script>

</body>
</html>
