<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Notifications — C360 Innovation Lab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800;900&family=DM+Sans:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="global.css">
  <style>
    :root { --sidebar-w: 250px; }
    body { display: flex; flex-direction: column; min-height: 100vh; background: var(--navy); cursor: none; }

    /* ── TOP NAV ── */
    .topnav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 500;
      height: 72px; background: rgba(7,9,15,0.95);
      backdrop-filter: blur(24px) saturate(180%);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px;
      animation: navSlide 0.8s cubic-bezier(0.16,1,0.3,1) both;
    }
    @keyframes navSlide { from{transform:translateY(-100%);opacity:0} to{transform:translateY(0);opacity:1} }
    .topnav-left { display: flex; align-items: center; gap: 14px; }
    .sidebar-toggle {
      background: none; border: none; cursor: none;
      display: flex; flex-direction: column; gap: 5px; padding: 6px;
      border-radius: 8px; transition: background 0.2s;
    }
    .sidebar-toggle:hover { background: var(--glass-b); }
    .sidebar-toggle span { display: block; width: 22px; height: 2px; background: var(--silver); border-radius: 2px; }
    .topnav .nav-logo {
      font-family: var(--font-d); font-size: 1.15rem; font-weight: 900;
      color: var(--cream); white-space: nowrap;
      display: flex; align-items: center; gap: 10px;
    }
    .topnav-right { display: flex; align-items: center; gap: 12px; }
    .topnav-bell {
      position: relative; display: flex; align-items: center;
      cursor: none; padding: 8px; border-radius: 10px; transition: background 0.2s;
    }
    .topnav-bell:hover { background: var(--glass-b); }
    .topnav-bell-badge {
      position: absolute; top: 4px; right: 4px;
      min-width: 16px; height: 16px; padding: 0 4px;
      background: var(--flame); color: #fff;
      font-family: var(--font-m); font-size: 0.55rem; font-weight: 700;
      border-radius: 100px; display: flex; align-items: center; justify-content: center;
      border: 2px solid var(--ink);
    }
    .topnav-avatar-wrap {
      display: flex; align-items: center; gap: 8px;
      cursor: none; padding: 5px 12px 5px 5px;
      border-radius: 100px; border: 1px solid var(--border);
      background: var(--glass); transition: border-color 0.2s, background 0.2s;
    }
    .topnav-avatar-wrap:hover { border-color: rgba(245,166,35,0.4); background: var(--glass-b); }
    .topnav-avatar {
      width: 32px; height: 32px; border-radius: 50%;
      background: linear-gradient(135deg, var(--gold), var(--flame));
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-m); font-size: 0.75rem; font-weight: 700; color: #fff;
    }
    .topnav-name { font-size: 0.85rem; font-weight: 600; color: var(--cream); }

    /* ── LAYOUT ── */
    .layout { display: flex; margin-top: 72px; flex: 1; }

    /* ── SIDEBAR ── */
    .sidebar {
      width: var(--sidebar-w); flex-shrink: 0;
      background: var(--deep); border-right: 1px solid var(--border);
      min-height: calc(100vh - 72px);
      position: fixed; top: 72px; left: 0; bottom: 0;
      display: flex; flex-direction: column;
      transition: transform 0.3s ease; z-index: 150; overflow-y: auto;
    }
    .sidebar.collapsed { transform: translateX(calc(-1 * var(--sidebar-w))); }
    .sidebar-user {
      padding: 22px 20px 18px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 12px;
    }
    .sidebar-avatar {
      width: 42px; height: 42px; border-radius: 50%; flex-shrink: 0;
      background: linear-gradient(135deg, var(--gold), var(--flame));
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-m); font-size: 1rem; font-weight: 700; color: #fff;
      border: 2px solid rgba(245,166,35,0.3);
    }
    .sidebar-uname { font-size: 0.88rem; font-weight: 700; color: var(--cream); font-family: var(--font-d); }
    .sidebar-urole { font-size: 0.68rem; color: var(--muted); margin-top: 2px; font-family: var(--font-m); text-transform: capitalize; }
    .sidebar-nav { padding: 12px 0; flex: 1; }
    .nav-section-label {
      font-family: var(--font-m); font-size: 0.62rem; font-weight: 700;
      letter-spacing: 1.5px; text-transform: uppercase;
      color: rgba(245,166,35,0.35); padding: 14px 20px 5px;
    }
    .sidebar-link {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 20px; color: rgba(226,232,240,0.6);
      font-size: 0.86rem; font-weight: 500;
      transition: background 0.2s, color 0.2s;
      cursor: none; border: none; background: none;
      width: 100%; text-align: left; font-family: var(--font-b);
      border-right: 3px solid transparent;
    }
    .sidebar-link:hover { background: var(--glass-b); color: var(--cream); }
    .sidebar-link.active { background: rgba(245,166,35,0.1); color: var(--gold); font-weight: 700; border-right-color: var(--gold); }
    .sidebar-link .s-icon { font-size: 1rem; width: 20px; text-align: center; flex-shrink: 0; }
    .sidebar-link.logout-link { color: rgba(252,165,165,0.7); }
    .sidebar-link.logout-link:hover { background: rgba(239,68,68,0.08); color: #f87171; }
    .sidebar-footer { padding: 14px 20px; border-top: 1px solid var(--border); font-family: var(--font-m); font-size: 0.65rem; color: rgba(245,166,35,0.25); letter-spacing: 1px; }

    /* ── MAIN ── */
    .main { margin-left: var(--sidebar-w); flex: 1; padding: 32px 28px; transition: margin-left 0.3s ease; min-width: 0; }
    .main.expanded { margin-left: 0; }
    .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 140; }
    .overlay.show { display: block; }

    /* ── SHARED ── */
    .section-card { background: var(--glass); border: 1px solid var(--border); border-radius: 14px; padding: 24px; margin-bottom: 20px; }
    .section-card:last-child { margin-bottom: 0; }
    .section-card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
    .section-card-header h2 { font-family: var(--font-d); font-size: 1rem; font-weight: 800; color: var(--cream); }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      .sidebar { transform: translateX(calc(-1 * var(--sidebar-w))); }
      .sidebar.open { transform: translateX(0); }
      .main { margin-left: 0; padding: 20px 16px; }
    }
    @media (max-width: 480px) { .topnav { padding: 0 14px; } .topnav-name { display: none; } }

    /* ── PAGE HEADER ── */
    .notif-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 28px; flex-wrap: wrap; gap: 14px;
    }
    .notif-header-left { display: flex; align-items: center; gap: 14px; }
    .notif-header-left h1 {
      font-family: var(--font-d); font-size: 1.8rem; font-weight: 900;
      color: var(--cream); letter-spacing: -0.5px;
    }
    .notif-header-left p { font-size: 0.85rem; color: var(--muted); margin-top: 4px; font-family: var(--font-m); }
    .unread-badge {
      display: inline-flex; align-items: center;
      padding: 4px 12px; border-radius: 100px;
      background: rgba(245,166,35,0.12); border: 1px solid rgba(245,166,35,0.25);
      color: var(--gold); font-family: var(--font-m); font-size: 0.68rem; font-weight: 700;
      letter-spacing: 0.5px; white-space: nowrap;
    }
    .btn-mark-all {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 9px 20px; border-radius: 9px;
      font-family: var(--font-b); font-size: 0.82rem; font-weight: 600;
      background: var(--glass); color: var(--silver);
      border: 1px solid var(--border); cursor: none;
      transition: border-color 0.2s, color 0.2s;
    }
    .btn-mark-all:hover { border-color: rgba(245,166,35,0.4); color: var(--gold); }

    /* ── NOTIFICATIONS LIST ── */
    .notif-list { display: flex; flex-direction: column; }
    .notif-item {
      display: flex; align-items: flex-start; gap: 16px;
      padding: 16px 20px; border-bottom: 1px solid var(--border);
      cursor: none; transition: background 0.2s;
      border-left: 3px solid transparent;
      text-decoration: none;
    }
    .notif-item:last-child { border-bottom: none; }
    .notif-item:hover { background: rgba(255,255,255,0.02); }
    .notif-item.unread {
      background: rgba(245,166,35,0.04);
      border-left-color: var(--gold);
    }
    .notif-item.unread:hover { background: rgba(245,166,35,0.07); }
    .notif-icon {
      width: 40px; height: 40px; border-radius: 12px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; font-size: 1rem;
    }
    .ni-club        { background: rgba(16,185,129,0.1);  }
    .ni-competition { background: rgba(245,166,35,0.1);  }
    .ni-mentorship  { background: rgba(99,179,237,0.1);  }
    .ni-incubation  { background: rgba(255,90,31,0.1);   }
    .ni-resource    { background: rgba(154,117,234,0.1); }
    .ni-broadcast   { background: rgba(239,68,68,0.1);   }
    .notif-body { flex: 1; min-width: 0; }
    .notif-title {
      font-size: 0.88rem; font-weight: 700; color: var(--cream);
      margin-bottom: 4px; display: flex; align-items: center; gap: 8px;
    }
    .notif-unread-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--gold); flex-shrink: 0;
      box-shadow: 0 0 6px rgba(245,166,35,0.6);
    }
    .notif-desc { font-size: 0.8rem; color: var(--silver); line-height: 1.6; font-weight: 300; margin-bottom: 6px; }
    .notif-meta { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .notif-time { font-family: var(--font-m); font-size: 0.62rem; color: var(--muted); letter-spacing: 0.5px; }
    .notif-link {
      font-family: var(--font-m); font-size: 0.62rem; font-weight: 700;
      color: var(--gold); letter-spacing: 0.5px;
      transition: opacity 0.2s;
    }
    .notif-link:hover { opacity: 0.7; }

    /* ── BROADCAST PANEL ── */
    .admin-divider { border: none; border-top: 1px solid var(--border); margin: 28px 0; }
    .admin-banner {
      background: rgba(239,68,68,0.06); border: 1px solid rgba(239,68,68,0.18);
      color: #f87171; border-radius: 10px; padding: 10px 16px;
      font-size: 0.8rem; font-weight: 600; font-family: var(--font-m);
      margin-bottom: 20px; letter-spacing: 0.3px;
    }
    .broadcast-form { display: none; margin-top: 20px; }
    .broadcast-form.open { display: block; }
    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: 0.8rem; font-weight: 600; color: var(--silver); margin-bottom: 6px; }
    .field input, .field textarea, .field select {
      width: 100%; padding: 10px 13px;
      background: rgba(255,255,255,0.04); border: 1px solid var(--border);
      border-radius: 9px; color: var(--text); font-size: 0.86rem;
      font-family: var(--font-b); outline: none; transition: border-color 0.2s;
    }
    .field input:focus, .field textarea:focus, .field select:focus { border-color: rgba(245,166,35,0.5); }
    .field input::placeholder, .field textarea::placeholder { color: var(--muted); }
    .field select option { background: var(--navy); }
    .btn-broadcast {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 9px 22px; border-radius: 9px;
      font-family: var(--font-b); font-size: 0.85rem; font-weight: 700;
      background: linear-gradient(135deg, var(--gold), var(--flame));
      color: #fff; border: none; cursor: none;
      box-shadow: 0 4px 16px rgba(245,166,35,0.25);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .btn-broadcast:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(245,166,35,0.4); }
    .btn-cancel-bc {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 9px 22px; border-radius: 9px;
      font-family: var(--font-b); font-size: 0.85rem; font-weight: 600;
      background: var(--glass); color: var(--silver);
      border: 1px solid var(--border); cursor: none;
      transition: border-color 0.2s, color 0.2s;
    }
    .btn-cancel-bc:hover { border-color: rgba(245,166,35,0.4); color: var(--gold); }
    .broadcast-success {
      display: none; margin-top: 14px;
      background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.3);
      color: #6ee7b7; border-radius: 9px; padding: 11px 16px;
      font-size: 0.85rem; font-weight: 600; font-family: var(--font-m);
    }
  </style>
</head>
<body>

<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursor-ring"></div>

<!-- TOP NAV -->
<nav class="topnav">
  <div class="topnav-left">
    <button class="sidebar-toggle" onclick="toggleSidebar()" aria-label="Toggle sidebar">
      <span></span><span></span><span></span>
    </button>
    <a href="index.html" class="nav-logo">
      <div class="logo-mark">C360</div>
      Innovation Lab
    </a>
  </div>
  <div class="topnav-right">
    <div class="topnav-bell" id="topnav-bell">
      <span style="font-size:1.1rem;">🔔</span>
      <span class="topnav-bell-badge" id="topnav-bell-badge">3</span>
    </div>
    <div class="topnav-avatar-wrap">
      <div class="topnav-avatar" id="topnav-initial">U</div>
      <span class="topnav-name" id="topnav-name">User</span>
    </div>
  </div>
</nav>

<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<div class="layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-user">
      <div class="sidebar-avatar" id="sidebar-initial">U</div>
      <div>
        <div class="sidebar-uname" id="sidebar-name">User</div>
        <div class="sidebar-urole" id="sidebar-role">Member</div>
      </div>
    </div>
    <nav class="sidebar-nav" id="sidebar-nav"></nav>
    <div class="sidebar-logout-wrap" id="sidebar-logout-wrap"></div>
    <div class="sidebar-footer">© 2025 C360 Innovation Lab</div>
  </aside>

  <main class="main" id="main">
    <div id="notif-content"></div>
  </main>
</div>

<script>
  /* ── AUTH GUARD ── */
  if (!localStorage.getItem('c360_logged_in')) { window.location.href = 'login.html'; }

  const userName    = localStorage.getItem('c360_username') || 'User';
  const userRole    = localStorage.getItem('c360_role') || 'student';
  const userInitial = userName.charAt(0).toUpperCase();

  /* ── POPULATE SHELL ── */
  document.getElementById('topnav-initial').textContent  = userInitial;
  document.getElementById('topnav-name').textContent     = userName.split(' ')[0];
  document.getElementById('sidebar-initial').textContent = userInitial;
  document.getElementById('sidebar-name').textContent    = userName;
  document.getElementById('sidebar-role').textContent    = userRole.replace('-', ' ');

  /* ── CURSOR ── */
  const cursor = document.getElementById('cursor');
  const ring   = document.getElementById('cursor-ring');
  let mx = -100, my = -100, rx = -100, ry = -100;
  document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
  (function animCursor() {
    if (cursor) { cursor.style.left = mx+'px'; cursor.style.top = my+'px'; }
    rx += (mx - rx) * 0.12; ry += (my - ry) * 0.12;
    if (ring) { ring.style.left = rx+'px'; ring.style.top = ry+'px'; }
    requestAnimationFrame(animCursor);
  })();
  document.querySelectorAll('a,button').forEach(el => {
    el.addEventListener('mouseenter', () => {
      if (cursor) cursor.style.transform = 'translate(-50%,-50%) scale(2.5)';
      if (ring) { ring.style.transform = 'translate(-50%,-50%) scale(1.5)'; ring.style.borderColor = 'rgba(245,166,35,0.9)'; }
    });
    el.addEventListener('mouseleave', () => {
      if (cursor) cursor.style.transform = 'translate(-50%,-50%) scale(1)';
      if (ring) { ring.style.transform = 'translate(-50%,-50%) scale(1)'; ring.style.borderColor = 'rgba(245,166,35,0.5)'; }
    });
  });

  /* ── SIDEBAR TOGGLE ── */
  const sidebar   = document.getElementById('sidebar');
  const mainEl    = document.getElementById('main');
  const overlay   = document.getElementById('overlay');
  const isDesktop = () => window.innerWidth > 768;
  function toggleSidebar() {
    if (isDesktop()) { sidebar.classList.toggle('collapsed'); mainEl.classList.toggle('expanded'); }
    else { sidebar.classList.toggle('open'); overlay.classList.toggle('show'); }
  }
  function closeSidebar() { sidebar.classList.remove('open'); overlay.classList.remove('show'); }
  window.addEventListener('resize', () => { if (isDesktop()) { sidebar.classList.remove('open'); overlay.classList.remove('show'); } });
  function setActive(el) {
    document.querySelectorAll('.sidebar-link').forEach(l => l.classList.remove('active'));
    el.classList.add('active');
    if (!isDesktop()) closeSidebar();
  }
  function handleLogout() {
    ['c360_logged_in','c360_username','c360_role','c360_email'].forEach(k => localStorage.removeItem(k));
    window.location.href = 'index.html';
  }
  document.getElementById('topnav-bell').addEventListener('click', () => {
    document.getElementById('topnav-bell-badge').style.display = 'none';
  });

  /* ── SIDEBAR LINKS ── */
  const commonTop = `
    <div class="nav-section-label">Main</div>
    <button class="sidebar-link" onclick="setActive(this);window.location.href='dashboard.html'"><span class="s-icon">🏠</span> Dashboard</button>
    <button class="sidebar-link" onclick="setActive(this);window.location.href='profile.html'"><span class="s-icon">👤</span> My Profile</button>
    <button class="sidebar-link" onclick="setActive(this);window.location.href='my-club.html'"><span class="s-icon">🌱</span> My Club</button>
    <div class="nav-section-label">Programs</div>
    <button class="sidebar-link" onclick="setActive(this);window.location.href='competitions.html'"><span class="s-icon">🏆</span> Competitions</button>
    <button class="sidebar-link" onclick="setActive(this);window.location.href='incubation.html'"><span class="s-icon">🚀</span> Apply for Incubation</button>
    <button class="sidebar-link" onclick="setActive(this);window.location.href='mentorship-sessions.html'"><span class="s-icon">🤝</span> Mentorship Sessions</button>
    <div class="nav-section-label">Resources</div>
    <button class="sidebar-link" onclick="setActive(this);window.location.href='resources.html'"><span class="s-icon">📚</span> Resources</button>
    <button class="sidebar-link active" onclick="setActive(this)"><span class="s-icon">🔔</span> Notifications</button>
  `;
  const logoutLink = `
    <div class="nav-section-label">Account</div>
    <button class="sidebar-link logout-link" onclick="handleLogout()"><span class="s-icon">🚪</span> Logout</button>
  `;
  const clubLeaderExtra = `
    <div class="nav-section-label">Club Management</div>
    <button class="sidebar-link" onclick="setActive(this);window.location.href='my-club.html'"><span class="s-icon">🛠️</span> Manage My Club</button>
  `;
  const adminExtra = `
    <div class="nav-section-label">Administration</div>
    <button class="sidebar-link" onclick="setActive(this)"><span class="s-icon">🌍</span> All Clubs</button>
    <button class="sidebar-link" onclick="setActive(this)"><span class="s-icon">👥</span> User Management</button>
    <button class="sidebar-link" onclick="setActive(this)"><span class="s-icon">📊</span> Analytics</button>
    <button class="sidebar-link" onclick="setActive(this)"><span class="s-icon">📝</span> Content Management</button>
  `;
  const mentorExtra = `
    <div class="nav-section-label">Mentor Tools</div>
    <button class="sidebar-link" onclick="setActive(this)"><span class="s-icon">👥</span> My Mentees</button>
    <button class="sidebar-link" onclick="setActive(this)"><span class="s-icon">📅</span> Scheduled Sessions</button>
    <button class="sidebar-link" onclick="setActive(this)"><span class="s-icon">📤</span> Post Resources</button>
  `;

  const sidebarNav = document.getElementById('sidebar-nav');
  if (userRole === 'club-leader') sidebarNav.innerHTML = commonTop + clubLeaderExtra;
  else if (userRole === 'admin')  sidebarNav.innerHTML = commonTop + adminExtra;
  else if (userRole === 'mentor') sidebarNav.innerHTML = commonTop + mentorExtra;
  else                            sidebarNav.innerHTML = commonTop;
  document.getElementById('sidebar-logout-wrap').innerHTML = logoutLink;

  /* ── SECTION A: PAGE HEADER ── */
  const now = new Date();
  const days   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const dateStr = days[now.getDay()] + ', ' + now.getDate() + ' ' + months[now.getMonth()] + ' ' + now.getFullYear();

  document.getElementById('notif-content').innerHTML = `
    <div class="notif-header">
      <div class="notif-header-left">
        <div>
          <h1>Notifications 🔔</h1>
          <p>${dateStr}</p>
        </div>
        <span class="unread-badge" id="unread-badge">5 unread</span>
      </div>
      <button class="btn-mark-all" onclick="markAllRead()">&#10003; Mark all as read</button>
    </div>
    <div id="notif-list-wrap"><!-- Section B injected here --></div>
    <div id="broadcast-panel"><!-- Section C injected here --></div>
  `;

  /* ── SECTION B: NOTIFICATIONS LIST ── */
  const notifications = [
    { id:1, type:'club',        icon:'🌱', cat:'ni-club',        title:'Club meeting rescheduled',             desc:'Your next Kampala Secondary Innovation Club meeting has been moved to Friday 18 July at 3:00 PM.',  time:'10 minutes ago', link:'my-club.html',              unread:true  },
    { id:2, type:'competition', icon:'🏆', cat:'ni-competition', title:'AgriInnovate Challenge — 3 days left',  desc:'The submission deadline for the AgriInnovate Challenge 2025 is in 3 days. Make sure your entry is ready.', time:'2 hours ago',    link:'competitions.html',         unread:true  },
    { id:3, type:'mentorship',  icon:'🤝', cat:'ni-mentorship',  title:'Mentorship session confirmed',         desc:'Your session with David Ochieng is confirmed for Thursday 17 July at 10:00 AM.',                  time:'Yesterday',      link:'mentorship-sessions.html',  unread:true  },
    { id:4, type:'resource',    icon:'📚', cat:'ni-resource',    title:'New resource added',                   desc:'A new grant guide — Uganda Youth Innovation Fund 2025 — has been added to the Resources page.',    time:'Yesterday',      link:'resources.html',            unread:true  },
    { id:5, type:'incubation',  icon:'🚀', cat:'ni-incubation',  title:'Incubation application received',      desc:'Your application for GreenTech Uganda has been received and is now under review by our team.',      time:'2 days ago',     link:'incubation.html',           unread:true  },
    { id:6, type:'club',        icon:'🌱', cat:'ni-club',        title:'New member joined your club',          desc:'Esther Nambi has joined the Kampala Secondary Innovation Club. Welcome them to the team!',          time:'3 days ago',     link:'my-club.html',              unread:false },
    { id:7, type:'competition', icon:'🏆', cat:'ni-competition', title:'Competition results published',         desc:'The results for the Digital Solutions Hackathon 2024 are now available. Check the Results tab.',    time:'1 week ago',     link:'competitions.html',         unread:false },
    { id:8, type:'broadcast',   icon:'📣', cat:'ni-broadcast',   title:'Platform announcement',                desc:'C360 Innovation Lab will be hosting a National Innovation Summit on 15 August 2025 in Kampala.',    time:'1 week ago',     link:'#',                         unread:false },
  ];

  let unreadCount = notifications.filter(n => n.unread).length;

  function updateUnreadBadge() {
    const badge = document.getElementById('unread-badge');
    if (!badge) return;
    if (unreadCount <= 0) {
      badge.textContent = 'All read';
      badge.style.background = 'rgba(100,116,139,0.12)';
      badge.style.borderColor = 'rgba(100,116,139,0.2)';
      badge.style.color = 'var(--muted)';
    } else {
      badge.textContent = unreadCount + ' unread';
      badge.style.background = '';
      badge.style.borderColor = '';
      badge.style.color = '';
    }
  }

  function markRead(id) {
    const n = notifications.find(n => n.id === id);
    if (!n || !n.unread) return;
    n.unread = false;
    unreadCount = Math.max(0, unreadCount - 1);
    const item = document.getElementById('notif-' + id);
    if (item) {
      item.classList.remove('unread');
      const dot = item.querySelector('.notif-unread-dot');
      if (dot) dot.remove();
    }
    updateUnreadBadge();
  }

  function markAllRead() {
    notifications.forEach(n => { n.unread = false; });
    unreadCount = 0;
    document.querySelectorAll('.notif-item.unread').forEach(el => {
      el.classList.remove('unread');
      const dot = el.querySelector('.notif-unread-dot');
      if (dot) dot.remove();
    });
    updateUnreadBadge();
  }

  const notifItems = notifications.map(n => `
    <a href="${n.link}" class="notif-item${n.unread ? ' unread' : ''}" id="notif-${n.id}"
       onclick="markRead(${n.id})">
      <div class="notif-icon ${n.cat}">${n.icon}</div>
      <div class="notif-body">
        <div class="notif-title">
          ${n.title}
          ${n.unread ? '<span class="notif-unread-dot"></span>' : ''}
        </div>
        <div class="notif-desc">${n.desc}</div>
        <div class="notif-meta">
          <span class="notif-time">${n.time}</span>
          ${n.link !== '#' ? `<span class="notif-link">View →</span>` : ''}
        </div>
      </div>
    </a>
  `).join('');

  document.getElementById('notif-list-wrap').innerHTML = `
    <div class="section-card" style="padding:0;overflow:hidden;">
      <div class="notif-list">${notifItems}</div>
    </div>
  `;

  updateUnreadBadge();

  /* ── SECTION C: ADMIN BROADCAST PANEL ── */
  if (userRole === 'admin') {
    document.getElementById('broadcast-panel').innerHTML = `
      <hr class="admin-divider"/>
      <div class="admin-banner">🛡️ Admin Only — Send Broadcast Notification</div>
      <div class="section-card">
        <div class="section-card-header">
          <h2>Send Broadcast</h2>
          <button class="btn-broadcast" onclick="toggleBroadcast()">&#128226; Compose</button>
        </div>
        <div class="broadcast-form" id="broadcast-form">
          <div class="field">
            <label>Notification Title</label>
            <input type="text" id="bc-title" placeholder="e.g. Platform Maintenance Notice"/>
          </div>
          <div class="field">
            <label>Message</label>
            <textarea id="bc-body" rows="4" placeholder="Write your broadcast message here..."></textarea>
          </div>
          <div class="field">
            <label>Target Audience</label>
            <select id="bc-audience">
              <option value="all">All Users</option>
              <option value="student">Students Only</option>
              <option value="club-leader">Club Leaders Only</option>
              <option value="mentor">Mentors Only</option>
            </select>
          </div>
          <div style="display:flex;gap:10px;">
            <button class="btn-broadcast" onclick="sendBroadcast()">&#128228; Send Broadcast</button>
            <button class="btn-cancel-bc" onclick="toggleBroadcast()">Cancel</button>
          </div>
          <div class="broadcast-success" id="bc-success">
            ✅ Broadcast sent successfully to <span id="bc-audience-label">all users</span>.
          </div>
        </div>
      </div>
    `;
  }

  function toggleBroadcast() {
    const form = document.getElementById('broadcast-form');
    if (form) {
      form.classList.toggle('open');
      document.getElementById('bc-success').style.display = 'none';
    }
  }

  function sendBroadcast() {
    const title    = document.getElementById('bc-title').value.trim();
    const body     = document.getElementById('bc-body').value.trim();
    const audience = document.getElementById('bc-audience');
    if (!title) { document.getElementById('bc-title').style.borderColor = '#ef4444'; return; }
    if (!body)  { document.getElementById('bc-body').style.borderColor  = '#ef4444'; return; }
    const audienceLabels = {
      'all': 'all users', 'student': 'all students',
      'club-leader': 'all club leaders', 'mentor': 'all mentors'
    };
    document.getElementById('bc-audience-label').textContent =
      audienceLabels[audience.value] || 'all users';
    document.getElementById('bc-success').style.display = 'block';
    document.getElementById('bc-title').value = '';
    document.getElementById('bc-body').value  = '';
    audience.value = 'all';
    setTimeout(() => {
      document.getElementById('broadcast-form').classList.remove('open');
      document.getElementById('bc-success').style.display = 'none';
    }, 3000);
  }
</script>

</body>
</html>
